<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        <a href="javascript:;" class="btn btn-primary btn-refresh" title="{:__('Refresh')}"><i class="fa fa-refresh"></i></a>
                        <a href="javascript:;" class="btn btn-success btn-add {:$auth->check('member/user/add')?'':'hide'}" title="{:__('Add')}"><i class="fa fa-plus"></i> {:__('Add')}</a>
                        <a href="javascript:;" class="btn btn-danger btn-del btn-disabled disabled {:$auth->check('member/user/del')?'':'hide'}" title="{:__('Delete')}"><i class="fa fa-trash"></i> {:__('Delete')}</a>
                        <div class="btn-group" style="margin-left:5px;">
                            <button type="button" class="btn btn-default dropdown-toggle" data-toggle="dropdown" title="会员筛选">
                                <i class="fa fa-filter"></i> 筛选 <span class="caret"></span>
                            </button>
                            <ul class="dropdown-menu">
                                <li><a href="javascript:;" onclick="filterAllMembers()"><i class="fa fa-list text-muted"></i> 全部会员</a></li>
                                <li class="divider"></li>
                                <li><a href="javascript:;" onclick="filterSystemMembers()"><i class="fa fa-robot" style="color:#1cc88a;"></i> 系统会员</a></li>
                                <li><a href="javascript:;" onclick="filterRealMembers()"><i class="fa fa-user" style="color:#36b9cc;"></i> 真实会员</a></li>
                            </ul>
                        </div>
                        <a href="javascript:;" class="btn btn-warning" onclick="openGenerateModal()" title="批量生成系统会员" style="margin-left:5px;background:linear-gradient(135deg,#f093fb,#f5576c);border:none;color:#fff;box-shadow:0 2px 8px rgba(245,87,108,0.35);">
                            <i class="fa fa-robot"></i> 生成系统会员
                        </a>
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('member/user/edit')}"
                           data-operate-del="{:$auth->check('member/user/del')}"
                           width="100%">
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 生成系统会员弹窗 -->
<div class="modal fade" id="generate-modal" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document" style="width:500px;">
        <div class="modal-content" style="border:none;border-radius:14px;overflow:hidden;box-shadow:0 25px 65px rgba(0,0,0,0.3);">
            <!-- 头部渐变 -->
            <div class="modal-header" style="background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);border:none;padding:22px 26px 18px;">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close" style="color:rgba(255,255,255,0.85);opacity:1;font-size:22px;text-shadow:0 1px 4px rgba(0,0,0,0.15);">
                    <span aria-hidden="true">&times;</span>
                </button>
                <div style="display:flex;align-items:center;">
                    <div style="width:46px;height:46px;background:rgba(255,255,255,0.22);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-right:14px;backdrop-filter:blur(4px);">
                        <i class="fa fa-robot" style="font-size:22px;color:#fff;"></i>
                    </div>
                    <div>
                        <h4 class="modal-title" style="color:#fff;font-size:18px;font-weight:700;margin:0 0 2px 0;text-shadow:0 1px 4px rgba(0,0,0,0.12);">批量生成系统会员</h4>
                        <p style="color:rgba(255,255,255,0.8);font-size:11.5px;margin:0;">自动生成随机用户信息，头像从附件库随机分配</p>
                    </div>
                </div>
            </div>

            <!-- 主体 -->
            <div class="modal-body" style="padding:24px 26px;background:#f8f9fb;">
                <!-- 统计卡片 -->
                <div style="display:flex;gap:10px;margin-bottom:22px;">
                    <div style="flex:1;background:linear-gradient(135deg,#1cc88a,#0fa674);border-radius:10px;padding:14px 16px;color:#fff;position:relative;overflow:hidden;">
                        <div style="position:absolute;top:-12px;right:-12px;width:48px;height:48px;background:rgba(255,255,255,0.1);border-radius:50%;"></div>
                        <div style="font-size:11px;opacity:0.8;margin-bottom:4px;"><i class="fa fa-robot"></i> 系统会员</div>
                        <div id="gen-sys-count" style="font-size:26px;font-weight:800;line-height:1;">0</div>
                    </div>
                    <div style="flex:1;background:linear-gradient(135deg,#36b9cc,#20849a);border-radius:10px;padding:14px 16px;color:#fff;position:relative;overflow:hidden;">
                        <div style="position:absolute;top:-12px;right:-12px;width:48px;height:48px;background:rgba(255,255,255,0.1);border-radius:50%;"></div>
                        <div style="font-size:11px;opacity:0.8;margin-bottom:4px;"><i class="fa fa-user"></i> 真实会员</div>
                        <div id="gen-real-count" style="font-size:26px;font-weight:800;line-height:1;">0</div>
                    </div>
                    <div style="flex:1;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:10px;padding:14px 16px;color:#fff;position:relative;overflow:hidden;">
                        <div style="position:absolute;top:-12px;right:-12px;width:48px;height:48px;background:rgba(255,255,255,0.1);border-radius:50%;"></div>
                        <div style="font-size:11px;opacity:0.8;margin-bottom:4px;"><i class="fa fa-users"></i> 总会员</div>
                        <div id="gen-total-count" style="font-size:26px;font-weight:800;line-height:1;">0</div>
                    </div>
                </div>

                <!-- 参数表单 -->
                <div id="generate-form" style="background:#fff;border-radius:10px;padding:18px 20px;box-shadow:0 1px 6px rgba(0,0,0,0.05);">
                    <!-- 生成数量 -->
                    <div style="margin-bottom:16px;">
                        <label style="font-size:13px;font-weight:600;color:#374151;display:flex;align-items:center;margin-bottom:7px;">
                            <i class="fa fa-cubes" style="color:#f5576c;margin-right:5px;font-size:12px;"></i> 生成数量
                            <span style="font-size:10.5px;color:#9ca3af;font-weight:400;margin-left:auto;">最多500个</span>
                        </label>
                        <div style="display:flex;align-items:center;gap:6px;">
                            <button type="button" class="btn btn-default" onclick="adjustCount(-10)" style="width:38px;height:38px;padding:0;font-size:13px;font-weight:700;border-radius:8px;">-10</button>
                            <button type="button" class="btn btn-default" onclick="adjustCount(-1)" style="width:38px;height:38px;padding:0;font-size:16px;font-weight:700;border-radius:8px;">-</button>
                            <input type="number" name="count" value="10" min="1" max="500" class="form-control" style="text-align:center;font-size:22px;font-weight:700;height:40px;border-radius:8px;border:2px solid #e5e7eb;transition:border-color 0.2s;" onfocus="this.style.borderColor='#f5576c'" onblur="this.style.borderColor='#e5e7eb'" />
                            <button type="button" class="btn btn-default" onclick="adjustCount(1)" style="width:38px;height:38px;padding:0;font-size:16px;font-weight:700;border-radius:8px;">+</button>
                            <button type="button" class="btn btn-default" onclick="adjustCount(10)" style="width:38px;height:38px;padding:0;font-size:13px;font-weight:700;border-radius:8px;">+10</button>
                        </div>
                        <div style="display:flex;gap:5px;margin-top:6px;">
                            <button type="button" class="btn" onclick="setCount(5)" style="font-size:10.5px;border-radius:5px;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;padding:2px 10px;">5</button>
                            <button type="button" class="btn" onclick="setCount(10)" style="font-size:10.5px;border-radius:5px;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;padding:2px 10px;">10</button>
                            <button type="button" class="btn" onclick="setCount(50)" style="font-size:10.5px;border-radius:5px;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;padding:2px 10px;">50</button>
                            <button type="button" class="btn" onclick="setCount(100)" style="font-size:10.5px;border-radius:5px;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;padding:2px 10px;">100</button>
                            <button type="button" class="btn" onclick="setCount(200)" style="font-size:10.5px;border-radius:5px;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;padding:2px 10px;">200</button>
                            <button type="button" class="btn" onclick="setCount(500)" style="font-size:10.5px;border-radius:5px;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;padding:2px 10px;">500</button>
                        </div>
                    </div>

                    <!-- 默认密码 -->
                    <div style="margin-bottom:14px;">
                        <label style="font-size:13px;font-weight:600;color:#374151;display:flex;align-items:center;margin-bottom:7px;">
                            <i class="fa fa-lock" style="color:#667eea;margin-right:5px;font-size:12px;"></i> 默认密码
                            <span style="font-size:10.5px;color:#9ca3af;font-weight:400;margin-left:auto;">最少4位</span>
                        </label>
                        <input type="text" name="password" value="qwe123" class="form-control" style="height:38px;border-radius:8px;border:2px solid #e5e7eb;font-size:13px;transition:border-color 0.2s;" onfocus="this.style.borderColor='#667eea'" onblur="this.style.borderColor='#e5e7eb'" />
                    </div>

                    <!-- 提示 -->
                    <div style="background:linear-gradient(135deg,#eff6ff,#ede9fe);border-radius:8px;padding:10px 14px;display:flex;align-items:flex-start;gap:8px;">
                        <i class="fa fa-info-circle" style="color:#667eea;margin-top:1px;font-size:14px;"></i>
                        <div style="font-size:11.5px;color:#4c1d95;line-height:1.7;">
                            用户名自动生成 (sys_xxxxxx) &middot; 昵称随机抽取 &middot; 头像从附件库随机分配<br>
                            手机号自动生成虚拟号码 &middot; 注册时间随机分布近一年内
                        </div>
                    </div>
                </div>
            </div>

            <!-- 底部 -->
            <div class="modal-footer" style="border:none;padding:14px 26px 22px;background:#f8f9fb;border-radius:0 0 14px 14px;">
                <button type="button" class="btn btn-default" data-dismiss="modal" style="border-radius:8px;padding:7px 22px;font-size:13px;">
                    <i class="fa fa-times"></i> 取消
                </button>
                <button type="button" class="btn" onclick="confirmGenerate()" style="background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;border:none;border-radius:8px;padding:7px 28px;font-size:13px;font-weight:600;box-shadow:0 4px 14px rgba(245,87,108,0.4);transition:all 0.2s;" onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 6px 20px rgba(245,87,108,0.5)'" onmouseout="this.style.transform='';this.style.boxShadow='0 4px 14px rgba(245,87,108,0.4)'">
                    <i class="fa fa-magic"></i> 立即生成
                </button>
            </div>
        </div>
    </div>
</div>

<style>
.add-blacklist-container {
    padding: 15px;
}
.info-card {
    background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    border-radius: 10px;
    padding: 20px;
    color: #fff;
    margin-bottom: 20px;
}
.info-card .type-icon {
    width: 50px;
    height: 50px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
}
.info-card .info-text {
    margin-left: 15px;
}
.info-card .info-text h4 {
    margin: 0 0 5px 0;
    font-size: 16px;
}
.info-card .info-text p {
    margin: 0;
    opacity: 0.9;
    font-size: 13px;
}
.form-section {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    margin-bottom: 15px;
}
.form-section-header {
    padding: 12px 15px;
    border-bottom: 1px solid #f0f0f0;
    font-weight: bold;
    color: #333;
}
.form-section-header i {
    margin-right: 8px;
    color: #11998e;
}
.form-section-body {
    padding: 15px;
}
.form-group {
    margin-bottom: 15px;
}
.control-label {
    font-weight: 500;
    color: #555;
}
.form-control {
    border-radius: 6px;
    border: 1px solid #e0e0e0;
    transition: all 0.3s;
}
.form-control:focus {
    border-color: #11998e;
    box-shadow: 0 0 0 0.2rem rgba(17, 153, 142, 0.25);
}
.select-type .form-control {
    height: 42px;
}
.value-input .form-control {
    font-family: 'Courier New', monospace;
    font-size: 14px;
}
.reason-textarea textarea {
    min-height: 80px;
    resize: vertical;
}
.status-switch {
    padding: 10px 0;
}
.status-switch .radio-inline {
    margin-right: 20px;
}
.status-switch .radio-inline input[type="radio"] {
    display: none;
}
.status-switch .radio-inline label {
    cursor: pointer;
    padding: 8px 20px;
    border-radius: 20px;
    transition: all 0.3s;
    border: 2px solid #e0e0e0;
}
.status-switch .radio-inline input[type="radio"]:checked + label {
    background: #11998e;
    color: #fff;
    border-color: #11998e;
}
.status-switch .radio-inline label:hover {
    background: #f5f5f5;
}
.btn-save {
    background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    border: none;
    padding: 10px 30px;
    border-radius: 25px;
    font-weight: bold;
    transition: all 0.3s;
}
.btn-save:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(17, 153, 142, 0.4);
}
.help-text {
    font-size: 12px;
    color: #888;
    margin-top: 5px;
}
.type-card {
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    padding: 15px;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
}
.type-card:hover {
    border-color: #11998e;
    background: #f8fffe;
}
.type-card.active {
    border-color: #11998e;
    background: #f0fff9;
}
.type-card .icon {
    font-size: 30px;
    margin-bottom: 8px;
}
.type-card .title {
    font-weight: bold;
    color: #333;
}
.type-card .desc {
    font-size: 12px;
    color: #888;
}
</style>

<div class="add-blacklist-container">
    <!-- 信息卡片 -->
    <div class="info-card">
        <div class="flex">
            <div class="type-icon">
                <i class="fa fa-plus-circle"></i>
            </div>
            <div class="info-text">
                <h4>添加黑名单记录</h4>
                <p>将用户、IP、设备或手机号加入黑名单</p>
            </div>
        </div>
    </div>

    <form id="add-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
        <!-- 类型选择 -->
        <div class="form-section">
            <div class="form-section-header">
                <i class="fa fa-tags"></i> 选择类型
            </div>
            <div class="form-section-body">
                <div class="row" id="type-selector">
                    <div class="col-xs-6 col-sm-3">
                        <div class="type-card" data-type="user">
                            <div class="icon">👤</div>
                            <div class="title">用户</div>
                            <div class="desc">用户ID</div>
                        </div>
                    </div>
                    <div class="col-xs-6 col-sm-3">
                        <div class="type-card active" data-type="ip">
                            <div class="icon">🌐</div>
                            <div class="title">IP地址</div>
                            <div class="desc">如: 192.168.1.1</div>
                        </div>
                    </div>
                    <div class="col-xs-6 col-sm-3">
                        <div class="type-card" data-type="device">
                            <div class="icon">📱</div>
                            <div class="title">设备ID</div>
                            <div class="desc">设备唯一标识</div>
                        </div>
                    </div>
                    <div class="col-xs-6 col-sm-3">
                        <div class="type-card" data-type="phone">
                            <div class="icon">📞</div>
                            <div class="title">手机号</div>
                            <div class="desc">如: 13800138000</div>
                        </div>
                    </div>
                </div>
                <input type="hidden" id="c-type" name="row[type]" value="ip" data-rule="required">
            </div>
        </div>

        <!-- 基本信息 -->
        <div class="form-section">
            <div class="form-section-header">
                <i class="fa fa-info-circle"></i> 基本信息
            </div>
            <div class="form-section-body">
                <div class="form-group value-input">
                    <label class="control-label col-xs-12">{:__('值')} <span class="text-danger">*</span></label>
                    <div class="col-xs-12">
                        <input id="c-value" class="form-control" name="row[value]" type="text" placeholder="请输入IP地址、用户ID、设备ID或手机号" data-rule="required">
                        <p class="help-text" id="value-hint">请输入要封禁的IP地址</p>
                    </div>
                </div>
                
                <div class="form-group reason-textarea">
                    <label class="control-label col-xs-12">{:__('加入原因')}</label>
                    <div class="col-xs-12">
                        <textarea id="c-reason" class="form-control" name="row[reason]" rows="3" placeholder="请输入加入黑名单的原因（可选）"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- 时间设置 -->
        <div class="form-section">
            <div class="form-section-header">
                <i class="fa fa-clock-o"></i> 时间设置
            </div>
            <div class="form-section-body">
                <div class="form-group">
                    <label class="control-label col-xs-12">{:__('过期时间')}</label>
                    <div class="col-xs-12">
                        <input id="c-expire_time" class="form-control datetimepicker" name="row[expire_time]" type="text" data-date-format="YYYY-MM-DD HH:mm:ss" placeholder="留空表示永久有效">
                        <p class="help-text"><i class="fa fa-info-circle"></i> 留空表示永久有效，不会自动过期</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 状态设置 -->
        <div class="form-section">
            <div class="form-section-header">
                <i class="fa fa-toggle-on"></i> 状态设置
            </div>
            <div class="form-section-body">
                <div class="form-group">
                    <label class="control-label col-xs-12">{:__('启用状态')}</label>
                    <div class="col-xs-12 status-switch">
                        <label class="radio-inline">
                            <input type="radio" name="row[enabled]" value="1" checked>
                            <label><i class="fa fa-check-circle"></i> 启用</label>
                        </label>
                        <label class="radio-inline">
                            <input type="radio" name="row[enabled]" value="0">
                            <label><i class="fa fa-ban"></i> 禁用</label>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部按钮 -->
        <div class="form-group layer-footer">
            <div class="col-xs-12 text-center">
                <button type="submit" class="btn btn-primary btn-save">
                    <i class="fa fa-plus"></i> {:__('添加黑名单')}
                </button>
            </div>
        </div>
    </form>
</div>

<script>
$(function() {
    // 类型选择
    $('.type-card').on('click', function() {
        $('.type-card').removeClass('active');
        $(this).addClass('active');
        var type = $(this).data('type');
        $('#c-type').val(type);
        
        // 更新提示文字
        var hints = {
            'user': '请输入要封禁的用户ID',
            'ip': '请输入要封禁的IP地址，如: 192.168.1.1',
            'device': '请输入要封禁的设备ID',
            'phone': '请输入要封禁的手机号，如: 13800138000'
        };
        $('#value-hint').text(hints[type] || '');
        
        // 更新placeholder
        var placeholders = {
            'user': '请输入用户ID',
            'ip': '如: 192.168.1.1',
            'device': '请输入设备ID',
            'phone': '如: 13800138000'
        };
        $('#c-value').attr('placeholder', placeholders[type] || '');
    });
});
</script>

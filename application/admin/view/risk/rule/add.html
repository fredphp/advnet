<form id="add-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">规则名称:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-rule_name" class="form-control" name="row[rule_name]" type="text" placeholder="规则名称" data-rule="required">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">规则代码:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-rule_code" class="form-control" name="row[rule_code]" type="text" placeholder="如: VIDEO_WATCH_SPEED" data-rule="required">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">规则类型:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-rule_type" class="form-control" name="row[rule_type]" data-rule="required">
                <option value="video">视频</option>
                <option value="task">任务</option>
                <option value="withdraw">提现</option>
                <option value="redpacket">红包</option>
                <option value="invite">邀请</option>
                <option value="global">全局</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">规则描述:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea id="c-description" class="form-control" name="row[description]" rows="2" placeholder="规则描述"></textarea>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">阈值:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-threshold" class="form-control" name="row[threshold]" type="number" step="0.01" value="0" data-rule="required">
            <span class="help-block">触发规则的最小值</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">风险权重:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-score_weight" class="form-control" name="row[score_weight]" type="number" value="10" data-rule="required">
            <span class="help-block">触发规则后增加的风险分数</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">处理动作:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-action" class="form-control" name="row[action]" data-rule="required">
                <option value="warn">警告</option>
                <option value="block">拦截</option>
                <option value="freeze">冻结</option>
                <option value="ban">封禁</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">处罚时长(秒):</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-action_duration" class="form-control" name="row[action_duration]" type="number" value="0">
            <span class="help-block">0表示永久，可填入：86400(1天)、604800(7天)、2592000(30天)</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">优先级:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-level" class="form-control" name="row[level]" type="number" value="1">
            <span class="help-block">数值越大优先级越高</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">状态:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-enabled" class="form-control" name="row[enabled]">
                <option value="1" selected>启用</option>
                <option value="0">禁用</option>
            </select>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>

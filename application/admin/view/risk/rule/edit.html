<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Rule_name')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-name" class="form-control" name="row[name]" type="text" value="{$row.name}" data-rule="required">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">规则代码:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-rule_code" class="form-control" name="row[rule_code]" type="text" value="{$row.rule_code}" data-rule="required">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">规则类型:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-rule_type" class="form-control" name="row[rule_type]" data-rule="required">
                <option value="video" {if $row.rule_type=='video'}selected{/if}>视频</option>
                <option value="task" {if $row.rule_type=='task'}selected{/if}>任务</option>
                <option value="withdraw" {if $row.rule_type=='withdraw'}selected{/if}>提现</option>
                <option value="redpacket" {if $row.rule_type=='redpacket'}selected{/if}>红包</option>
                <option value="invite" {if $row.rule_type=='invite'}selected{/if}>邀请</option>
                <option value="global" {if $row.rule_type=='global'}selected{/if}>全局</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">阈值:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-threshold" class="form-control" name="row[threshold]" type="number" value="{$row.threshold}" data-rule="required">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">风险分权重:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-score_weight" class="form-control" name="row[score_weight]" type="number" value="{$row.score_weight}" data-rule="required">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">处理动作:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-action" class="form-control" name="row[action]" data-rule="required">
                <option value="warn" {if $row.action=='warn'}selected{/if}>警告</option>
                <option value="block" {if $row.action=='block'}selected{/if}>拦截</option>
                <option value="freeze" {if $row.action=='freeze'}selected{/if}>冻结</option>
                <option value="ban" {if $row.action=='ban'}selected{/if}>封禁</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">动作时长(秒):</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-action_duration" class="form-control" name="row[action_duration]" type="number" value="{$row.action_duration}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">状态:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-enabled" class="form-control" name="row[enabled]">
                <option value="1" {if $row.enabled==1}selected{/if}>启用</option>
                <option value="0" {if $row.enabled==0}selected{/if}>禁用</option>
            </select>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>

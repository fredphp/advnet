<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">规则名称:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-rule_name" class="form-control" name="row[rule_name]" type="text" value="{$row.rule_name|default=''}" data-rule="required">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">规则代码:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-rule_code" class="form-control" name="row[rule_code]" type="text" value="{$row.rule_code|default=''}" data-rule="required">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">规则类型:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-rule_type" class="form-control" name="row[rule_type]" data-rule="required">
                <option value="video" {if $row.rule_type=='video'}selected{/if}>视频</option>
                <option value="task" {if $row.rule_type=='task'}selected{/if}>任务</option>
                <option value="withdraw" {if $row.rule_type=='withdraw'}selected{/if}>提现</option>
                <option value="redpacket" {if $row.rule_type=='redpacket'}selected{/if}>红包</option>
                <option value="invite" {if $row.rule_type=='invite'}selected{/if}>邀请</option>
                <option value="global" {if $row.rule_type=='global'}selected{/if}>全局</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">规则描述:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea id="c-description" class="form-control" name="row[description]" rows="2">{$row.description|default=''}</textarea>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">阈值:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-threshold" class="form-control" name="row[threshold]" type="number" step="0.01" value="{$row.threshold|default=0}" data-rule="required">
            <span class="help-block">触发规则的最小值</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">风险权重:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-score_weight" class="form-control" name="row[score_weight]" type="number" value="{$row.score_weight|default=10}" data-rule="required">
            <span class="help-block">触发规则后增加的风险分数</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">处理动作:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-action" class="form-control" name="row[action]" data-rule="required">
                <option value="warn" {if $row.action=='warn'}selected{/if}>警告</option>
                <option value="block" {if $row.action=='block'}selected{/if}>拦截</option>
                <option value="freeze" {if $row.action=='freeze'}selected{/if}>冻结</option>
                <option value="ban" {if $row.action=='ban'}selected{/if}>封禁</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">处罚时长(秒):</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-action_duration" class="form-control" name="row[action_duration]" type="number" value="{$row.action_duration|default=0}">
            <span class="help-block">0表示永久，可填入：86400(1天)、604800(7天)、2592000(30天)</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">优先级:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-level" class="form-control" name="row[level]" type="number" value="{$row.level|default=1}">
            <span class="help-block">数值越大优先级越高</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">状态:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-enabled" class="form-control" name="row[enabled]">
                <option value="1" {if $row.enabled==1}selected{/if}>启用</option>
                <option value="0" {if $row.enabled==0}selected{/if}>禁用</option>
            </select>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>

<style>
    .risk-rule-wrapper {
        padding: 0;
    }
    
    /* 顶部统计卡片 */
    .rule-stats {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }
    
    .stat-card {
        flex: 1;
        min-width: 180px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 12px;
        padding: 20px;
        color: #fff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .stat-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    
    .stat-card.video { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3); }
    .stat-card.task { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3); }
    .stat-card.withdraw { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); box-shadow: 0 4px 15px rgba(67, 233, 123, 0.3); }
    .stat-card.redpacket { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); box-shadow: 0 4px 15px rgba(250, 112, 154, 0.3); }
    .stat-card.invite { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); color: #666; box-shadow: 0 4px 15px rgba(168, 237, 234, 0.3); }
    .stat-card.global { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3); }
    
    .stat-card .stat-icon {
        position: absolute;
        right: 15px;
        top: 15px;
        font-size: 40px;
        opacity: 0.3;
    }
    
    .stat-card .stat-value {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 5px;
    }
    
    .stat-card .stat-label {
        font-size: 13px;
        opacity: 0.9;
    }
    
    .stat-card .stat-status {
        font-size: 12px;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid rgba(255,255,255,0.2);
    }
    
    /* 规则类型标签样式 */
    .rule-type-badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
        white-space: nowrap;
    }
    
    .rule-type-badge i {
        margin-right: 4px;
    }
    
    .rule-type-badge.video { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: #fff; }
    .rule-type-badge.task { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #fff; }
    .rule-type-badge.withdraw { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: #fff; }
    .rule-type-badge.redpacket { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); color: #fff; }
    .rule-type-badge.invite { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); color: #666; }
    .rule-type-badge.global { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
    
    /* 处理动作标签样式 */
    .action-badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
    }
    
    .action-badge i {
        margin-right: 4px;
    }
    
    .action-badge.warn { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
    .action-badge.block { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .action-badge.freeze { background: #cce5ff; color: #004085; border: 1px solid #b8daff; }
    .action-badge.ban { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    
    /* 状态样式 */
    .status-enabled {
        color: #28a745;
        font-weight: 600;
    }
    
    .status-enabled::before {
        content: '';
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #28a745;
        border-radius: 50%;
        margin-right: 6px;
        animation: pulse 2s infinite;
    }
    
    .status-disabled {
        color: #dc3545;
    }
    
    .status-disabled::before {
        content: '';
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #dc3545;
        border-radius: 50%;
        margin-right: 6px;
    }
    
    @keyframes pulse {
        0% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.2); }
        100% { opacity: 1; transform: scale(1); }
    }
    
    /* 风险权重进度条 */
    .weight-progress {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .weight-bar {
        flex: 1;
        height: 6px;
        background: #e9ecef;
        border-radius: 3px;
        overflow: hidden;
    }
    
    .weight-bar-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.3s ease;
    }
    
    .weight-low { background: linear-gradient(90deg, #43e97b, #38f9d7); }
    .weight-medium { background: linear-gradient(90deg, #fa709a, #fee140); }
    .weight-high { background: linear-gradient(90deg, #f093fb, #f5576c); }
    
    /* 阈值显示 */
    .threshold-value {
        font-family: 'Monaco', 'Menlo', monospace;
        background: #f8f9fa;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 13px;
        color: #495057;
    }
    
    /* 处罚时长 */
    .duration-tag {
        display: inline-flex;
        align-items: center;
        padding: 3px 10px;
        background: #f8f9fa;
        border-radius: 12px;
        font-size: 12px;
        color: #6c757d;
    }
    
    .duration-tag.permanent {
        background: #dc3545;
        color: #fff;
    }
    
    /* 优先级徽章 */
    .level-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        font-size: 12px;
        font-weight: 600;
        color: #fff;
    }
    
    .level-badge.level-1 { background: #6c757d; }
    .level-badge.level-2 { background: #17a2b8; }
    .level-badge.level-3 { background: #20c997; }
    .level-badge.level-4 { background: #fd7e14; }
    .level-badge.level-5, .level-badge.level-6, .level-badge.level-7,
    .level-badge.level-8, .level-badge.level-9, .level-badge.level-10 { 
        background: linear-gradient(135deg, #f5576c, #f093fb); 
    }
    
    /* 表格美化 */
    .table > tbody > tr {
        transition: background-color 0.2s ease;
    }
    
    .table > tbody > tr:hover {
        background-color: #f8f9ff !important;
    }
    
    /* 描述文本截断 */
    .desc-text {
        max-width: 200px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #6c757d;
        font-size: 13px;
    }
    
    .desc-text:hover {
        white-space: normal;
        overflow: visible;
    }
    
    /* 工具栏美化 */
    #toolbar {
        padding: 10px 0;
    }
    
    /* 规则代码样式 */
    .rule-code {
        font-family: 'Monaco', 'Menlo', monospace;
        background: #e9ecef;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 12px;
        color: #495057;
    }
</style>

<div class="panel panel-default panel-intro risk-rule-wrapper">
    {:build_heading()}

    <div class="panel-body">
        <!-- 统计卡片 -->
        <div class="rule-stats" id="rule-stats">
            <!-- 由JS动态生成 -->
        </div>
        
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        {:build_toolbar('refresh,add,edit,del')}
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('risk/rule/edit')}"
                           data-operate-del="{:$auth->check('risk/rule/del')}"
                           width="100%">
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

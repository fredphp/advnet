<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        {:build_toolbar('refresh')}
                        <div class="dropdown btn-group">
                            <a class="btn btn-warning dropdown-toggle" data-toggle="dropdown">
                                风险等级 <span class="caret"></span>
                            </a>
                            <ul class="dropdown-menu">
                                <li><a href="javascript:;" data-field="risk_level" data-value="safe">安全</a></li>
                                <li><a href="javascript:;" data-field="risk_level" data-value="low">低风险</a></li>
                                <li><a href="javascript:;" data-field="risk_level" data-value="medium">中风险</a></li>
                                <li><a href="javascript:;" data-field="risk_level" data-value="high">高风险</a></li>
                                <li><a href="javascript:;" data-field="risk_level" data-value="dangerous">危险</a></li>
                            </ul>
                        </div>
                        <div class="dropdown btn-group">
                            <a class="btn btn-danger dropdown-toggle" data-toggle="dropdown">
                                状态 <span class="caret"></span>
                            </a>
                            <ul class="dropdown-menu">
                                <li><a href="javascript:;" data-field="status" data-value="normal">正常</a></li>
                                <li><a href="javascript:;" data-field="status" data-value="frozen">冻结</a></li>
                                <li><a href="javascript:;" data-field="status" data-value="banned">封禁</a></li>
                            </ul>
                        </div>
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           width="100%">
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="panel panel-default panel-intro">
    <div class="panel-heading">
        {:build_heading()}
    </div>
    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        <a href="javascript:;" class="btn btn-primary btn-sm btn-add {:$auth->check('risk/whitelist/add')?'':'hide'}" title="添加">
                            <i class="fa fa-plus"></i> 添加
                        </a>
                        <a href="javascript:;" class="btn btn-danger btn-sm btn-del btn-disabled disabled {:$auth->check('risk/whitelist/del')?'':'hide'}" title="删除">
                            <i class="fa fa-trash"></i> 删除
                        </a>
                        <div class="dropdown btn-group">
                            <a class="btn btn-primary btn-sm dropdown-toggle" data-toggle="dropdown" href="javascript:;">
                                <i class="fa fa-filter"></i> 类型筛选
                            </a>
                            <ul class="dropdown-menu">
                                <li><a href="javascript:;" onclick="$('#table').bootstrapTable('refresh', {query: {filter: {type: ''}}})">全部</a></li>
                                <li><a href="javascript:;" onclick="$('#table').bootstrapTable('refresh', {query: {filter: {type: 'user'}}})">用户</a></li>
                                <li><a href="javascript:;" onclick="$('#table').bootstrapTable('refresh', {query: {filter: {type: 'ip'}}})">IP地址</a></li>
                                <li><a href="javascript:;" onclick="$('#table').bootstrapTable('refresh', {query: {filter: {type: 'device'}}})">设备ID</a></li>
                                <li><a href="javascript:;" onclick="$('#table').bootstrapTable('refresh', {query: {filter: {type: 'phone'}}})">手机号</a></li>
                            </ul>
                        </div>
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('risk/whitelist/edit')}"
                           data-operate-del="{:$auth->check('risk/whitelist/del')}"
                           width="100%">
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function executeTask(taskName, btn) {
    var $card = $(btn).closest('.task-card');
    var days = $card.find('.days-input').val();
    var $result = $card.find('.result');
    
    // 显示加载状态
    btn.disabled = true;
    btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 执行中...';
    $('.progress-overlay').show();
    
    $.ajax({
        url: '<?php echo url("migration/execute/index"); ?>',
        type: 'POST',
        dataType: 'json',
        data: {
            action: taskName,
            params: {days: days}
        },
        success: function(ret) {
            $('.progress-overlay').hide();
            if (ret.code == 1) {
                $result.removeClass('error').addClass('success').show();
                $result.html('<i class="fa fa-check-circle"></i> 执行成功！迁移数据: ' + (ret.data.migrated || 0) + ' 条，删除: ' + (ret.data.deleted || 0) + ' 条');
                btn.innerHTML = '<i class="fa fa-check"></i> 执行完成';
            } else {
                $result.removeClass('success').addClass('error').show();
                $result.html('<i class="fa fa-times-circle"></i> ' + ret.msg);
                btn.disabled = false;
                btn.innerHTML = '<i class="fa fa-play"></i> 开始执行';
            }
        },
        error: function(xhr) {
            $('.progress-overlay').hide();
            $result.removeClass('success').addClass('error').show();
            $result.html('<i class="fa fa-times-circle"></i> 请求失败，请稍后重试');
            btn.disabled = false;
            btn.innerHTML = '<i class="fa fa-play"></i> 开始执行';
        }
    });
}
</script>

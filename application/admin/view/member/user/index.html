<style>
/* 状态标签样式 */
.status-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
}

.status-badge.normal {
    background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
    color: #047857;
}

.status-badge.frozen {
    background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
    color: #b45309;
}

.status-badge.banned {
    background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
    color: #b91c1c;
}

/* 操作按钮组样式 */
.btn-group-operate {
    display: inline-flex;
    gap: 3px;
}

.btn-group-operate .btn {
    padding: 4px 8px;
    font-size: 12px;
    border-radius: 4px;
    border: none;
    transition: all 0.2s;
}

.btn-group-operate .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}

.btn-group-operate .btn-xs {
    padding: 3px 6px;
    font-size: 11px;
}

/* 下拉菜单美化 */
.dropdown-menu {
    border: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    border-radius: 8px;
    padding: 6px 0;
    min-width: 160px;
}

.dropdown-menu > li > a {
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    transition: all 0.2s;
}

.dropdown-menu > li > a:hover {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
}

.dropdown-menu > li > a i {
    width: 16px;
    text-align: center;
}

.dropdown-menu .divider {
    margin: 5px 0;
    background: #e9ecef;
}

.dropdown-menu .dropdown-header {
    padding: 6px 16px;
    font-size: 10px;
    font-weight: 600;
    color: #6c757d;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* 按钮颜色 */
.btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
}
.btn-primary:hover {
    background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%);
}

.btn-info {
    background: linear-gradient(135deg, #36b9cc 0%, #258396 100%);
    border: none;
}
.btn-info:hover {
    background: linear-gradient(135deg, #2c9cac 0%, #1e6b7a 100%);
}

.btn-warning {
    background: linear-gradient(135deg, #f6c23e 0%, #d39e00 100%);
    border: none;
    color: #fff;
}
.btn-warning:hover {
    background: linear-gradient(135deg, #dda91f 0%, #b88600 100%);
    color: #fff;
}

.btn-danger {
    background: linear-gradient(135deg, #e74a3b 0%, #be2617 100%);
    border: none;
}
.btn-danger:hover {
    background: linear-gradient(135deg, #d23627 0%, #9e1f12 100%);
}

.btn-success {
    background: linear-gradient(135deg, #1cc88a 0%, #13855c 100%);
    border: none;
}
.btn-success:hover {
    background: linear-gradient(135deg, #17a673 0%, #0f6d48 100%);
}

/* 弹窗样式优化 */
.modal-content {
    border: none;
    border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

.modal-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    border-radius: 12px 12px 0 0;
    padding: 15px 20px;
}

.modal-header .close {
    color: #fff;
    opacity: 0.8;
    text-shadow: none;
}

.modal-header .close:hover {
    opacity: 1;
}

.modal-body {
    padding: 20px;
}

.modal-footer {
    border-top: 1px solid #e9ecef;
    padding: 15px 20px;
}

/* 用户详情弹窗 */
.user-detail-modal .detail-section {
    background: #f8f9fa;
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 15px;
}

.user-detail-modal .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px dashed #e9ecef;
}

.user-detail-modal .detail-row:last-child {
    border-bottom: none;
}

.user-detail-modal .detail-label {
    color: #6c757d;
    font-size: 13px;
}

.user-detail-modal .detail-value {
    font-weight: 500;
    color: #333;
}

/* 表格行悬停效果 */
.table > tbody > tr:hover {
    background: #f8f9fa;
}

/* 快捷金额按钮 */
.quick-amounts {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.quick-amounts .btn {
    border-radius: 20px;
}
</style>

<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        {:build_toolbar('refresh,add,edit,del')}
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('member/user/edit')}"
                           data-operate-del="{:$auth->check('member/user/del')}"
                           width="100%">
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 充值金币弹窗 -->
<div id="recharge-modal" class="modal fade" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal">&times;</button>
                <h4 class="modal-title"><i class="fa fa-coins"></i> 充值金币</h4>
            </div>
            <div class="modal-body">
                <div class="alert alert-info" id="recharge-user-info"></div>
                <form id="recharge-form">
                    <input type="hidden" name="user_id" value="">
                    <div class="form-group">
                        <label>充值金币数量 <span class="text-danger">*</span></label>
                        <input type="number" name="amount" class="form-control" placeholder="请输入充值金币数量" required min="1">
                    </div>
                    <div class="form-group">
                        <label>快捷金额</label>
                        <div class="quick-amounts">
                            <button type="button" class="btn btn-default btn-sm btn-quick-amount" data-amount="100">+100</button>
                            <button type="button" class="btn btn-default btn-sm btn-quick-amount" data-amount="500">+500</button>
                            <button type="button" class="btn btn-default btn-sm btn-quick-amount" data-amount="1000">+1000</button>
                            <button type="button" class="btn btn-default btn-sm btn-quick-amount" data-amount="5000">+5000</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <textarea name="remark" class="form-control" placeholder="备注信息（选填）" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-success" id="btn-recharge-confirm"><i class="fa fa-check"></i> 确认充值</button>
            </div>
        </div>
    </div>
</div>

<!-- 扣除金币弹窗 -->
<div id="deduct-modal" class="modal fade" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal">&times;</button>
                <h4 class="modal-title"><i class="fa fa-minus-circle"></i> 扣除金币</h4>
            </div>
            <div class="modal-body">
                <div class="alert alert-warning" id="deduct-user-info"></div>
                <form id="deduct-form">
                    <input type="hidden" name="user_id" value="">
                    <div class="form-group">
                        <label>扣除金币数量 <span class="text-danger">*</span></label>
                        <input type="number" name="amount" class="form-control" placeholder="请输入扣除金币数量" required min="1">
                    </div>
                    <div class="form-group">
                        <label>扣除原因 <span class="text-danger">*</span></label>
                        <select name="reason_type" class="form-control">
                            <option value="">请选择原因</option>
                            <option value="异常行为扣除">异常行为扣除</option>
                            <option value="违规操作扣除">违规操作扣除</option>
                            <option value="风控扣除">风控扣除</option>
                            <option value="其他原因">其他原因</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>详细说明</label>
                        <textarea name="remark" class="form-control" placeholder="请详细说明扣除原因" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" id="btn-deduct-confirm"><i class="fa fa-minus"></i> 确认扣除</button>
            </div>
        </div>
    </div>
</div>

<!-- 封禁用户弹窗 -->
<div id="ban-modal" class="modal fade" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background: linear-gradient(135deg, #e74a3b 0%, #be2617 100%);">
                <button type="button" class="close" data-dismiss="modal">&times;</button>
                <h4 class="modal-title"><i class="fa fa-ban"></i> 封禁用户</h4>
            </div>
            <div class="modal-body">
                <div class="alert alert-danger" id="ban-user-info"></div>
                <form id="ban-form">
                    <input type="hidden" name="user_id" value="">
                    <div class="form-group">
                        <label>封禁类型 <span class="text-danger">*</span></label>
                        <select name="ban_type" class="form-control" required>
                            <option value="temporary">临时封禁</option>
                            <option value="permanent">永久封禁</option>
                        </select>
                    </div>
                    <div class="form-group ban-duration-group">
                        <label>封禁时长（小时）</label>
                        <input type="number" name="duration" class="form-control" placeholder="留空则默认24小时" value="24">
                    </div>
                    <div class="form-group">
                        <label>封禁原因 <span class="text-danger">*</span></label>
                        <select name="reason_type" class="form-control">
                            <option value="">请选择原因</option>
                            <option value="涉嫌刷量">涉嫌刷量</option>
                            <option value="违规操作">违规操作</option>
                            <option value="异常登录">异常登录</option>
                            <option value="投诉举报">投诉举报</option>
                            <option value="其他原因">其他原因</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>详细说明</label>
                        <textarea name="remark" class="form-control" placeholder="封禁详细说明" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" id="btn-ban-confirm"><i class="fa fa-ban"></i> 确认封禁</button>
            </div>
        </div>
    </div>
</div>

<!-- 冻结账户弹窗 -->
<div id="freeze-modal" class="modal fade" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background: linear-gradient(135deg, #f6c23e 0%, #d39e00 100%);">
                <button type="button" class="close" data-dismiss="modal">&times;</button>
                <h4 class="modal-title"><i class="fa fa-snowflake"></i> 冻结账户</h4>
            </div>
            <div class="modal-body">
                <div class="alert alert-warning" id="freeze-user-info"></div>
                <form id="freeze-form">
                    <input type="hidden" name="user_id" value="">
                    <div class="form-group">
                        <label>冻结时长 <span class="text-danger">*</span></label>
                        <select name="duration" class="form-control" required>
                            <option value="24">24小时</option>
                            <option value="72">3天</option>
                            <option value="168">7天</option>
                            <option value="720">30天</option>
                            <option value="0">永久冻结</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>冻结原因 <span class="text-danger">*</span></label>
                        <textarea name="reason" class="form-control" placeholder="请输入冻结原因" rows="2" required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-warning" id="btn-freeze-confirm"><i class="fa fa-snowflake"></i> 确认冻结</button>
            </div>
        </div>
    </div>
</div>

<!-- 用户详情弹窗 -->
<div id="user-detail-modal" class="modal fade" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal">&times;</button>
                <h4 class="modal-title"><i class="fa fa-id-card"></i> 用户详情</h4>
            </div>
            <div class="modal-body user-detail-modal" id="user-detail-content">
                <!-- 动态加载内容 -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>

<script>
// 快捷金额按钮 - 阻止表单提交
$(document).on('click', '.btn-quick-amount', function(e) {
    e.preventDefault();
    var amount = parseInt($(this).data('amount'));
    var $input = $('#recharge-form input[name="amount"]');
    var current = parseInt($input.val()) || 0;
    $input.val(current + amount);
    return false;
});
</script>

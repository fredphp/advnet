<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        {:build_toolbar('refresh,add,edit,del')}
                        <div class="dropdown btn-group">
                            <a class="btn btn-warning dropdown-toggle" data-toggle="dropdown">
                                操作 <span class="caret"></span>
                            </a>
                            <ul class="dropdown-menu">
                                <li><a href="javascript:;" class="btn-recharge">充值金币</a></li>
                                <li><a href="javascript:;" class="btn-deduct">扣除金币</a></li>
                                <li class="divider"></li>
                                <li><a href="javascript:;" class="btn-export">导出用户</a></li>
                            </ul>
                        </div>
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('member/user/edit')}"
                           data-operate-del="{:$auth->check('member/user/del')}"
                           width="100%">
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 充值金币弹窗 -->
<div id="recharge-modal" class="modal fade" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal">&times;</button>
                <h4 class="modal-title">充值金币</h4>
            </div>
            <div class="modal-body">
                <form id="recharge-form">
                    <div class="form-group">
                        <label>充值金币数量</label>
                        <input type="number" name="amount" class="form-control" placeholder="请输入充值金币数量" required>
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <textarea name="remark" class="form-control" placeholder="备注信息"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="btn-recharge-confirm">确认</button>
            </div>
        </div>
    </div>
</div>

<!-- 扣除金币弹窗 -->
<div id="deduct-modal" class="modal fade" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal">&times;</button>
                <h4 class="modal-title">扣除金币</h4>
            </div>
            <div class="modal-body">
                <form id="deduct-form">
                    <div class="form-group">
                        <label>扣除金币数量</label>
                        <input type="number" name="amount" class="form-control" placeholder="请输入扣除金币数量" required>
                    </div>
                    <div class="form-group">
                        <label>扣除原因</label>
                        <textarea name="remark" class="form-control" placeholder="扣除原因" required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" id="btn-deduct-confirm">确认扣除</button>
            </div>
        </div>
    </div>
</div>

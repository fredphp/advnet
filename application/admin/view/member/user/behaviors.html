<style>
.behavior-type-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
}

.behavior-type-badge.login {
    background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
    color: #047857;
}

.behavior-type-badge.register {
    background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
    color: #1d4ed8;
}

.behavior-type-badge.withdraw {
    background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
    color: #b45309;
}

.behavior-type-badge.watch {
    background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%);
    color: #7c3aed;
}

.behavior-type-badge.task {
    background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%);
    color: #be185d;
}

.behavior-type-badge.share {
    background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
    color: #4338ca;
}

.behavior-type-badge.other {
    background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
    color: #4b5563;
}
</style>

<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div class="widget-body no-padding">
            <div id="toolbar" class="toolbar">
                {:build_toolbar('refresh')}
                <div class="dropdown btn-group">
                    <a class="btn btn-primary btn-sm dropdown-toggle" data-toggle="dropdown" href="javascript:;">
                        <i class="fa fa-filter"></i> 行为类型
                    </a>
                    <ul class="dropdown-menu">
                        <li><a href="javascript:;" onclick="$('#table').bootstrapTable('refresh', {query: {type: ''}})">全部</a></li>
                        <li><a href="javascript:;" onclick="$('#table').bootstrapTable('refresh', {query: {type: 'login'}})">登录</a></li>
                        <li><a href="javascript:;" onclick="$('#table').bootstrapTable('refresh', {query: {type: 'register'}})">注册</a></li>
                        <li><a href="javascript:;" onclick="$('#table').bootstrapTable('refresh', {query: {type: 'withdraw'}})">提现</a></li>
                        <li><a href="javascript:;" onclick="$('#table').bootstrapTable('refresh', {query: {type: 'watch'}})">观看</a></li>
                        <li><a href="javascript:;" onclick="$('#table').bootstrapTable('refresh', {query: {type: 'task'}})">任务</a></li>
                        <li><a href="javascript:;" onclick="$('#table').bootstrapTable('refresh', {query: {type: 'share'}})">分享</a></li>
                    </ul>
                </div>
            </div>
            <table id="table" class="table table-striped table-bordered table-hover table-nowrap" width="100%">
            </table>
        </div>
    </div>
</div>

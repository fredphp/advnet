<style>
.edit-user-box { padding: 15px; }
.edit-user-box .user-header { display: flex; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
.edit-user-box .user-avatar { width: 40px; height: 40px; border-radius: 50%; margin-right: 12px; background: #f5f5f5; }
.edit-user-box .user-name { font-size: 16px; font-weight: 600; color: #333; }
.edit-user-box .user-id { font-size: 12px; color: #999; margin-top: 2px; }
.edit-user-box .section-title { font-size: 13px; font-weight: 600; color: #333; margin: 15px 0 10px; padding-left: 8px; border-left: 3px solid #667eea; }
.edit-user-box .form-row { display: flex; flex-wrap: wrap; margin: 0 -6px; }
.edit-user-box .form-row .form-col { width: 50%; padding: 0 6px; margin-bottom: 10px; }
.edit-user-box .form-row .form-col.full { width: 100%; }
.edit-user-box .form-row .form-col label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
.edit-user-box .form-row .form-col .form-control { height: 32px; font-size: 13px; }
.edit-user-box .form-row .form-col .form-control-static { height: 32px; line-height: 30px; padding: 0 12px; background: #f5f5f5; border-radius: 4px; font-size: 13px; color: #333; overflow: hidden; }
.edit-user-box .coin-box { background: #fffbe6; border: 1px solid #f0e68a; border-radius: 4px; padding: 10px 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.edit-user-box .coin-box .coin-label { font-size: 12px; color: #996600; }
.edit-user-box .coin-box .coin-value { font-size: 18px; font-weight: 600; color: #cc9900; }
.edit-user-box .coin-box .coin-frozen { font-size: 12px; color: #996600; }
.edit-user-box .status-group { display: flex; gap: 8px; }
.edit-user-box .status-group label { flex: 1; text-align: center; margin: 0; cursor: pointer; }
.edit-user-box .status-group input { display: none; }
.edit-user-box .status-btn { display: inline-block; padding: 6px 16px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; color: #666; background: #fff; transition: all 0.2s; }
.edit-user-box .status-group input:checked + .status-btn { border-color: #667eea; background: #f0f3ff; color: #667eea; }
.edit-user-box .status-group input[value="normal"]:checked + .status-btn { border-color: #10b981; background: #ecfdf5; color: #10b981; }
.edit-user-box .status-group input[value="frozen"]:checked + .status-btn { border-color: #f59e0b; background: #fffbeb; color: #f59e0b; }
.edit-user-box .status-group input[value="banned"]:checked + .status-btn { border-color: #ef4444; background: #fef2f2; color: #ef4444; }
.edit-user-box .status-btn i { margin-right: 4px; }
.edit-user-box .btn-footer { margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; text-align: right; }
.edit-user-box .btn-footer .btn { min-width: 80px; }
@media (max-width: 576px) {
    .edit-user-box .form-row .form-col { width: 100%; }
}
</style>

<div class="edit-user-box">
    <div class="user-header">
        <img class="user-avatar" src="{$row.avatar|default='/assets/img/avatar.png'}" onerror="this.src='/assets/img/avatar.png'">
        <div>
            <div class="user-name">{$row.nickname|default=$row.username}</div>
            <div class="user-id">ID: {$row.id} · @{$row.username}</div>
        </div>
    </div>

    <form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
        <div class="section-title">基本信息</div>
        <div class="form-row">
            <div class="form-col">
                <label>用户名</label>
                <p class="form-control-static">{$row.username}</p>
            </div>
            <div class="form-col">
                <label>昵称</label>
                <input class="form-control" name="row[nickname]" type="text" value="{$row.nickname}" placeholder="昵称">
            </div>
            <div class="form-col">
                <label>手机号</label>
                <input class="form-control" name="row[mobile]" type="text" value="{$row.mobile}" placeholder="手机号">
            </div>
            <div class="form-col">
                <label>邮箱</label>
                <input class="form-control" name="row[email]" type="email" value="{$row.email}" placeholder="邮箱">
            </div>
        </div>

        <div class="section-title">金币与等级</div>
        <div class="coin-box">
            <div>
                <span class="coin-label">金币余额</span>
                <span class="coin-value">{$coin_account.balance|default=0}</span>
            </div>
            <span class="coin-frozen">冻结: {$coin_account.frozen|default=0}</span>
        </div>
        <div class="form-row">
            <div class="form-col">
                <label>用户等级</label>
                <input class="form-control" name="row[level]" type="number" value="{$row.level|default=1}" min="1">
            </div>
            <div class="form-col">
                <label>VIP等级</label>
                <input class="form-control" name="row[vip_level]" type="number" value="{$row.vip_level|default=0}" min="0">
            </div>
            <div class="form-col">
                <label>积分</label>
                <input class="form-control" name="row[score]" type="number" value="{$row.score|default=0}" min="0">
            </div>
            <div class="form-col">
                <label>最后登录</label>
                <p class="form-control-static">{if $row.logintime}{$row.logintime|date='Y-m-d H:i',###}{else}从未{/if}</p>
            </div>
        </div>

        <div class="section-title">账户状态</div>
        <div class="form-row">
            <div class="form-col full">
                <label>状态</label>
                <div class="status-group">
                    <label>
                        <input type="radio" name="row[status]" value="normal" {if $row.status=='normal'}checked{/if}>
                        <span class="status-btn"><i class="fa fa-check-circle"></i> 正常</span>
                    </label>
                    <label>
                        <input type="radio" name="row[status]" value="frozen" {if $row.status=='frozen'}checked{/if}>
                        <span class="status-btn"><i class="fa fa-snowflake"></i> 冻结</span>
                    </label>
                    <label>
                        <input type="radio" name="row[status]" value="banned" {if $row.status=='banned'}checked{/if}>
                        <span class="status-btn"><i class="fa fa-ban"></i> 封禁</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="btn-footer">
            <button type="button" class="btn btn-default" onclick="Layer.closeAll()">取消</button>
            <button type="submit" class="btn btn-primary">保存</button>
        </div>
    </form>
</div>

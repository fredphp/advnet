<div class="panel panel-default panel-intro">
    <div class="panel-heading">
        <div class="panel-lead"><em>用户统计</em></div>
    </div>

    <div class="panel-body">
        <div class="row" style="margin-bottom:15px;">
            <div class="col-xs-12 col-sm-6">
                <label>开始日期:</label>
                <input type="text" id="start_date" class="form-control datetimepicker" value="{$start_date|default=''}" data-date-format="YYYY-MM-DD">
            </div>
            <div class="col-xs-12 col-sm-6">
                <label>结束日期:</label>
                <input type="text" id="end_date" class="form-control datetimepicker" value="{$end_date|default=''}" data-date-format="YYYY-MM-DD">
            </div>
        </div>

        <div class="row">
            <div class="col-md-3">
                <div class="panel panel-info">
                    <div class="panel-heading">总用户数</div>
                    <div class="panel-body text-center">
                        <h2 id="total-users">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="panel panel-success">
                    <div class="panel-heading">正常用户</div>
                    <div class="panel-body text-center">
                        <h2 id="normal-users">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="panel panel-warning">
                    <div class="panel-heading">冻结用户</div>
                    <div class="panel-body text-center">
                        <h2 id="frozen-users">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="panel panel-danger">
                    <div class="panel-heading">封禁用户</div>
                    <div class="panel-body text-center">
                        <h2 id="banned-users">-</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="panel panel-default">
                    <div class="panel-heading">每日新增用户</div>
                    <div class="panel-body">
                        <div id="chart-new-users" style="height:300px;"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="panel panel-default">
                    <div class="panel-heading">每日活跃用户</div>
                    <div class="panel-body">
                        <div id="chart-active-users" style="height:300px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="panel panel-default">
                    <div class="panel-heading">用户来源分布</div>
                    <div class="panel-body">
                        <table class="table table-striped">
                            <thead><tr><th>来源</th><th>用户数</th></tr></thead>
                            <tbody id="source-distribution"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="panel panel-default">
                    <div class="panel-heading">设备类型分布</div>
                    <div class="panel-body">
                        <table class="table table-striped">
                            <thead><tr><th>设备类型</th><th>用户数</th></tr></thead>
                            <tbody id="device-distribution"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

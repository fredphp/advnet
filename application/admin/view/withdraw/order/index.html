<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        <a href="javascript:;" class="btn btn-primary btn-refresh" title="{:__('Refresh')}"><i class="fa fa-refresh"></i></a>
                        <a href="javascript:;" class="btn btn-success btn-approve btn-disabled disabled {:$auth->check('withdraw/order/approve')?'':'hide'}" title="审核通过"><i class="fa fa-check"></i> 审核通过</a>
                        <a href="javascript:;" class="btn btn-danger btn-reject btn-disabled disabled {:$auth->check('withdraw/order/reject')?'':'hide'}" title="审核拒绝"><i class="fa fa-times"></i> 审核拒绝</a>
                        <a href="javascript:;" class="btn btn-warning btn-complete btn-disabled disabled {:$auth->check('withdraw/order/complete')?'':'hide'}" title="确认打款"><i class="fa fa-money"></i> 确认打款</a>
                        <a href="javascript:;" class="btn btn-info btn-export {:$auth->check('withdraw/order/export')?'':'hide'}" title="导出"><i class="fa fa-download"></i> 导出</a>
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-detail="{:$auth->check('withdraw/order/detail')}"
                           width="100%">
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
define(['jquery', 'bootstrap', 'backend', 'table', 'form'], function ($, undefined, Backend, Table, Form) {
    var Controller = {
        index: function () {
            // 初始化表格参数配置
            Table.api.init({
                extend: {
                    index_url: 'withdraw/order/index' + location.search,
                    detail_url: 'withdraw/order/detail',
                    multi_url: 'withdraw/order/multi',
                    export_url: 'withdraw/order/export',
                    table: 'withdraw_order',
                }
            });

            var table = $("#table");

            // 初始化表格
            table.bootstrapTable({
                url: $.fn.bootstrapTable.defaults.extend.index_url,
                pk: 'id',
                sortName: 'id',
                sortOrder: 'desc',
                columns: [
                    [
                        {checkbox: true},
                        {field: 'id', title: __('ID'), sortable: true},
                        {field: 'order_no', title: '订单号', operate: 'LIKE'},
                        {field: 'user_id', title: '用户ID'},
                        {field: 'user.nickname', title: '用户昵称'},
                        {field: 'coin_amount', title: '提现金币', sortable: true},
                        {field: 'cash_amount', title: '提现金额(元)', sortable: true},
                        {field: 'withdraw_type', title: '提现方式', searchList: {"alipay":"支付宝","wechat":"微信","bank":"银行卡"}},
                        {field: 'withdraw_account', title: '收款账号'},
                        {field: 'withdraw_name', title: '收款人'},
                        {field: 'status', title: '状态', searchList: {"0":"待审核","1":"审核通过","2":"打款中","3":"提现成功","4":"审核拒绝","5":"打款失败","6":"已取消"}, formatter: Table.api.formatter.status},
                        {field: 'createtime', title: '申请时间', operate:'RANGE', addclass:'datetimerange', autocomplete:false, formatter: Table.api.formatter.datetime},
                        {field: 'operate', title: __('Operate'), table: table, events: Table.api.events.operate, formatter: Table.api.formatter.operate}
                    ]
                ]
            });

            // 审核通过
            $(document).on('click', '.btn-approve', function() {
                var ids = Table.api.selectedids(table);
                if (ids.length === 0) {
                    Toastr.error('请选择要审核的记录');
                    return;
                }
                Layer.confirm('确认审核通过选中的记录？', {icon: 3, title: '提示'}, function(index) {
                    Fast.api.ajax({
                        url: 'withdraw/order/approve',
                        data: {ids: ids.join(',')},
                    }, function(data, ret) {
                        Toastr.success(ret.msg);
                        table.bootstrapTable('refresh');
                        Layer.close(index);
                    });
                });
            });

            // 审核拒绝
            $(document).on('click', '.btn-reject', function() {
                var ids = Table.api.selectedids(table);
                if (ids.length === 0) {
                    Toastr.error('请选择要拒绝的记录');
                    return;
                }
                Layer.prompt({title: '请输入拒绝原因', formType: 0}, function(value, index) {
                    Fast.api.ajax({
                        url: 'withdraw/order/reject',
                        data: {ids: ids.join(','), reason: value},
                    }, function(data, ret) {
                        Toastr.success(ret.msg);
                        table.bootstrapTable('refresh');
                        Layer.close(index);
                    });
                });
            });

            // 确认打款
            $(document).on('click', '.btn-complete', function() {
                var ids = Table.api.selectedids(table);
                if (ids.length === 0) {
                    Toastr.error('请选择要打款的记录');
                    return;
                }
                Layer.confirm('确认已打款？', {icon: 3, title: '提示'}, function(index) {
                    Fast.api.ajax({
                        url: 'withdraw/order/complete',
                        data: {ids: ids.join(',')},
                    }, function(data, ret) {
                        Toastr.success(ret.msg);
                        table.bootstrapTable('refresh');
                        Layer.close(index);
                    });
                });
            });

            // 导出
            $(document).on('click', '.btn-export', function() {
                window.location.href = 'withdraw/order/export' + location.search;
            });

            // 为表格绑定事件
            Table.api.bindevent(table);
        },
        api: {
            bindevent: function () {
                Form.api.bindevent($("form[role=form]"));
            }
        }
    };
    return Controller;
});
</script>

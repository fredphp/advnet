<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        <a href="javascript:;" class="btn btn-primary btn-refresh" title="{:__('Refresh')}"><i class="fa fa-refresh"></i></a>
                        <a href="javascript:;" class="btn btn-success btn-approve btn-disabled disabled {:$auth->check('withdraw/order/approve')?'':'hide'}" title="审核通过"><i class="fa fa-check"></i> 审核通过</a>
                        <a href="javascript:;" class="btn btn-danger btn-reject btn-disabled disabled {:$auth->check('withdraw/order/reject')?'':'hide'}" title="审核拒绝"><i class="fa fa-times"></i> 审核拒绝</a>
                        <a href="javascript:;" class="btn btn-warning btn-complete btn-disabled disabled {:$auth->check('withdraw/order/complete')?'':'hide'}" title="确认打款"><i class="fa fa-money"></i> 确认打款</a>
                        <a href="javascript:;" class="btn btn-info btn-export {:$auth->check('withdraw/order/export')?'':'hide'}" title="导出"><i class="fa fa-download"></i> 导出</a>
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-detail="{:$auth->check('withdraw/order/detail')}"
                           data-operate-approve="{:$auth->check('withdraw/order/approve')}"
                           data-operate-reject="{:$auth->check('withdraw/order/reject')}"
                           data-operate-complete="{:$auth->check('withdraw/order/complete')}"
                           width="100%">
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <!-- 日期筛选 -->
        <div class="row" style="margin-bottom:15px;">
            <div class="col-xs-12 col-sm-4">
                <label>开始日期:</label>
                <input type="text" id="start_date" class="form-control datetimepicker" value="{$start_date|default=''}" data-date-format="YYYY-MM-DD">
            </div>
            <div class="col-xs-12 col-sm-4">
                <label>结束日期:</label>
                <input type="text" id="end_date" class="form-control datetimepicker" value="{$end_date|default=''}" data-date-format="YYYY-MM-DD">
            </div>
            <div class="col-xs-12 col-sm-4">
                <label>&nbsp;</label>
                <div>
                    <button type="button" class="btn btn-primary" id="btn-search">
                        <i class="fa fa-search"></i> 查询
                    </button>
                    <button type="button" class="btn btn-default" id="btn-today">今日</button>
                    <button type="button" class="btn btn-default" id="btn-month">本月</button>
                    <button type="button" class="btn btn-default" id="btn-year">本年</button>
                </div>
            </div>
        </div>

        <!-- 汇总统计卡片 -->
        <div class="row" style="margin-bottom:15px;">
            <div class="col-xs-6 col-sm-4 col-md-2">
                <div class="panel panel-primary">
                    <div class="panel-body text-center">
                        <div class="text-muted">提现总额</div>
                        <h3 class="text-primary">¥<span id="stat-total-amount">0.00</span></h3>
                        <small class="text-muted">共 <span id="stat-total-count">0</span> 笔</small>
                    </div>
                </div>
            </div>
            <div class="col-xs-6 col-sm-4 col-md-2">
                <div class="panel panel-warning">
                    <div class="panel-body text-center">
                        <div class="text-muted">待审核</div>
                        <h3 class="text-warning">¥<span id="stat-pending-amount">0.00</span></h3>
                        <small class="text-muted">共 <span id="stat-pending-count">0</span> 笔</small>
                    </div>
                </div>
            </div>
            <div class="col-xs-6 col-sm-4 col-md-2">
                <div class="panel panel-info">
                    <div class="panel-body text-center">
                        <div class="text-muted">审核通过</div>
                        <h3 class="text-info">¥<span id="stat-approved-amount">0.00</span></h3>
                        <small class="text-muted">共 <span id="stat-approved-count">0</span> 笔</small>
                    </div>
                </div>
            </div>
            <div class="col-xs-6 col-sm-4 col-md-2">
                <div class="panel panel-success">
                    <div class="panel-body text-center">
                        <div class="text-muted">提现成功</div>
                        <h3 class="text-success">¥<span id="stat-success-amount">0.00</span></h3>
                        <small class="text-muted">共 <span id="stat-success-count">0</span> 笔</small>
                    </div>
                </div>
            </div>
            <div class="col-xs-6 col-sm-4 col-md-2">
                <div class="panel panel-danger">
                    <div class="panel-body text-center">
                        <div class="text-muted">已拒绝</div>
                        <h3 class="text-danger">¥<span id="stat-rejected-amount">0.00</span></h3>
                        <small class="text-muted">共 <span id="stat-rejected-count">0</span> 笔</small>
                    </div>
                </div>
            </div>
            <div class="col-xs-6 col-sm-4 col-md-2">
                <div class="panel panel-default">
                    <div class="panel-body text-center">
                        <div class="text-muted">审核通过率</div>
                        <h3 class="text-primary"><span id="stat-approve-rate">0</span>%</h3>
                        <small class="text-muted">审核通过/总申请</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- 每日趋势图表 -->
        <div class="row">
            <div class="col-md-8">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <i class="fa fa-line-chart"></i> 每日提现趋势
                    </div>
                    <div class="panel-body">
                        <div id="chart-daily" style="height: 300px;"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <i class="fa fa-pie-chart"></i> 状态分布
                    </div>
                    <div class="panel-body">
                        <div id="chart-status" style="height: 300px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 用户提现排行 -->
        <div class="row">
            <div class="col-md-6">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <i class="fa fa-trophy"></i> 提现金额排行 TOP 10
                    </div>
                    <div class="panel-body">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th width="50">排名</th>
                                    <th>用户ID</th>
                                    <th>提现次数</th>
                                    <th>提现金额</th>
                                    <th>成功金额</th>
                                </tr>
                            </thead>
                            <tbody id="top-amount-list">
                                <tr><td colspan="5" class="text-center text-muted">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <i class="fa fa-bar-chart"></i> 每日提现统计明细
                    </div>
                    <div class="panel-body">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>日期</th>
                                    <th>申请笔数</th>
                                    <th>申请金额</th>
                                    <th>成功笔数</th>
                                    <th>成功金额</th>
                                </tr>
                            </thead>
                            <tbody id="daily-stats-list">
                                <tr><td colspan="5" class="text-center text-muted">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

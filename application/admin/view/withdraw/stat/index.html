<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <!-- 日期筛选 -->
        <div class="row" style="margin-bottom: 15px;">
            <div class="col-xs-12 col-sm-8">
                <form class="form-inline" role="form">
                    <div class="form-group">
                        <label for="start_date">开始日期：</label>
                        <input type="text" class="form-control datetimepicker" id="start_date" name="start_date" value="{:date('Y-m-01')}" data-date-format="YYYY-MM-DD">
                    </div>
                    <div class="form-group" style="margin-left: 10px;">
                        <label for="end_date">结束日期：</label>
                        <input type="text" class="form-control datetimepicker" id="end_date" name="end_date" value="{:date('Y-m-d')}" data-date-format="YYYY-MM-DD">
                    </div>
                    <button type="button" class="btn btn-primary btn-refresh" style="margin-left: 10px;">
                        <i class="fa fa-refresh"></i> 刷新
                    </button>
                </form>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="row">
            <!-- 总提现 -->
            <div class="col-md-3 col-sm-6">
                <div class="panel panel-primary">
                    <div class="panel-body text-center">
                        <h4 class="text-muted">总提现</h4>
                        <h2 class="text-primary"><strong id="total-amount">0</strong></h2>
                        <p class="text-muted">共 <span id="total-count">0</span> 笔</p>
                    </div>
                </div>
            </div>
            <!-- 待审核 -->
            <div class="col-md-3 col-sm-6">
                <div class="panel panel-warning">
                    <div class="panel-body text-center">
                        <h4 class="text-muted">待审核</h4>
                        <h2 class="text-warning"><strong id="pending-amount">0</strong></h2>
                        <p class="text-muted">共 <span id="pending-count">0</span> 笔</p>
                    </div>
                </div>
            </div>
            <!-- 已完成 -->
            <div class="col-md-3 col-sm-6">
                <div class="panel panel-success">
                    <div class="panel-body text-center">
                        <h4 class="text-muted">已完成</h4>
                        <h2 class="text-success"><strong id="completed-amount">0</strong></h2>
                        <p class="text-muted">共 <span id="completed-count">0</span> 笔</p>
                    </div>
                </div>
            </div>
            <!-- 已拒绝 -->
            <div class="col-md-3 col-sm-6">
                <div class="panel panel-danger">
                    <div class="panel-body text-center">
                        <h4 class="text-muted">已拒绝</h4>
                        <h2 class="text-danger"><strong id="rejected-amount">0</strong></h2>
                        <p class="text-muted">共 <span id="rejected-count">0</span> 笔</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 详细统计表格 -->
        <div class="row" style="margin-top: 20px;">
            <div class="col-md-6">
                <div class="panel panel-info">
                    <div class="panel-heading">
                        <h3 class="panel-title"><i class="fa fa-bar-chart"></i> 统计概览</h3>
                    </div>
                    <div class="panel-body">
                        <table class="table table-bordered">
                            <thead>
                                <tr>
                                    <th>状态</th>
                                    <th>金额（元）</th>
                                    <th>笔数</th>
                                    <th>占比</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><span class="label label-warning">待审核</span></td>
                                    <td id="pending-amount-2">0</td>
                                    <td id="pending-count-2">0</td>
                                    <td id="pending-percent">0%</td>
                                </tr>
                                <tr>
                                    <td><span class="label label-success">已完成</span></td>
                                    <td id="completed-amount-2">0</td>
                                    <td id="completed-count-2">0</td>
                                    <td id="completed-percent">0%</td>
                                </tr>
                                <tr>
                                    <td><span class="label label-danger">已拒绝</span></td>
                                    <td id="rejected-amount-2">0</td>
                                    <td id="rejected-count-2">0</td>
                                    <td id="rejected-percent">0%</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <h3 class="panel-title"><i class="fa fa-info-circle"></i> 说明</h3>
                    </div>
                    <div class="panel-body">
                        <ul class="list-unstyled">
                            <li style="margin-bottom: 10px;"><i class="fa fa-check text-success"></i> 统计数据基于选择的时间范围</li>
                            <li style="margin-bottom: 10px;"><i class="fa fa-check text-success"></i> 金额单位为：元</li>
                            <li style="margin-bottom: 10px;"><i class="fa fa-check text-success"></i> 数据每5分钟自动刷新一次</li>
                            <li style="margin-bottom: 10px;"><i class="fa fa-check text-success"></i> 点击刷新按钮可手动更新数据</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.panel-body h2 {
    margin: 10px 0;
}
.panel-body h4 {
    margin: 0 0 10px 0;
}
.datetimepicker {
    width: 150px;
}
</style>

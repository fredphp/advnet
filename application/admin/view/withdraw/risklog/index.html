<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        {:build_toolbar('refresh')}
                        <a class="btn btn-success btn-batch-pass" href="javascript:;">
                            <i class="fa fa-check"></i> 批量通过
                        </a>
                        <a class="btn btn-warning btn-batch-review" href="javascript:;">
                            <i class="fa fa-user"></i> 批量审核
                        </a>
                        <a class="btn btn-danger btn-batch-reject" href="javascript:;">
                            <i class="fa fa-ban"></i> 批量拒绝
                        </a>
                        <a class="btn btn-default btn-batch-freeze" href="javascript:;">
                            <i class="fa fa-snowflake-o"></i> 批量冻结
                        </a>
                        <div class="dropdown btn-group">
                            <a class="btn btn-default dropdown-toggle" data-toggle="dropdown">
                                <i class="fa fa-filter"></i> 风险等级 <span class="caret"></span>
                            </a>
                            <ul class="dropdown-menu">
                                <li><a href="javascript:;" data-field="risk_level" data-value="0">普通</a></li>
                                <li><a href="javascript:;" data-field="risk_level" data-value="1">低风险</a></li>
                                <li><a href="javascript:;" data-field="risk_level" data-value="2">中风险</a></li>
                                <li><a href="javascript:;" data-field="risk_level" data-value="3">高风险</a></li>
                            </ul>
                        </div>
                        <div class="dropdown btn-group">
                            <a class="btn btn-default dropdown-toggle" data-toggle="dropdown">
                                <i class="fa fa-filter"></i> 处理状态 <span class="caret"></span>
                            </a>
                            <ul class="dropdown-menu">
                                <li><a href="javascript:;" data-field="handle_action" data-value="">待处理</a></li>
                                <li><a href="javascript:;" data-field="handle_action" data-value="pass">已通过</a></li>
                                <li><a href="javascript:;" data-field="handle_action" data-value="review">人工审核</a></li>
                                <li><a href="javascript:;" data-field="handle_action" data-value="reject">已拒绝</a></li>
                                <li><a href="javascript:;" data-field="handle_action" data-value="freeze">已冻结</a></li>
                            </ul>
                        </div>
                        <div class="dropdown btn-group">
                            <a class="btn btn-default dropdown-toggle" data-toggle="dropdown">
                                <i class="fa fa-filter"></i> 风险评分 <span class="caret"></span>
                            </a>
                            <ul class="dropdown-menu">
                                <li><a href="javascript:;" data-field="risk_score" data-value="low">低风险(0-29)</a></li>
                                <li><a href="javascript:;" data-field="risk_score" data-value="medium">中风险(30-49)</a></li>
                                <li><a href="javascript:;" data-field="risk_score" data-value="high">高风险(50+)</a></li>
                            </ul>
                        </div>
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           width="100%">
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.table tr td .btn-xs {
    margin: 2px;
}
#toolbar .btn {
    margin-right: 5px;
}
.dropdown-menu a[data-field] {
    cursor: pointer;
}
</style>

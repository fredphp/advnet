<form id="add-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    {:token()}
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">周期第几天:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="number" name="row[day]" class="form-control" min="1" max="365" required placeholder="例如：1">
            <span class="help-block">签到周期内的第几天，第8天签到将获得第1天的奖励（7天一周期）</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">奖励金币:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="number" name="row[coins]" class="form-control" min="0" value="0" required placeholder="例如：10">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">规则描述:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="text" name="row[description]" class="form-control" placeholder="例如：第1天签到奖励10金币">
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-success btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>

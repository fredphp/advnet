<form id="detail-form" class="form-horizontal" role="form">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">用户名:</label>
        <div class="col-xs-12 col-sm-8">
            <p class="form-control-static">{$row.username|default='-'}</p>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">昵称:</label>
        <div class="col-xs-12 col-sm-8">
            <p class="form-control-static">{$row.nickname|default='-'}</p>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">视频标题:</label>
        <div class="col-xs-12 col-sm-8">
            <p class="form-control-static">{$row.title|default='-'}</p>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">视频时长:</label>
        <div class="col-xs-12 col-sm-8">
            <p class="form-control-static">{$row.video_duration|default='-'}秒</p>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">观看时长:</label>
        <div class="col-xs-12 col-sm-8">
            <p class="form-control-static">{$row.watch_duration|default='-'}秒</p>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">观看进度:</label>
        <div class="col-xs-12 col-sm-8">
            <p class="form-control-static">{$row.watch_progress|default=0}%</p>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">获得金币:</label>
        <div class="col-xs-12 col-sm-8">
            <p class="form-control-static">{$row.coin_earned|default=0}</p>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">观看时间:</label>
        <div class="col-xs-12 col-sm-8">
            <p class="form-control-static">{$row.createtime|date='Y-m-d H:i:s',###}</p>
        </div>
    </div>
</form>

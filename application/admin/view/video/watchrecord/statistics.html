<div class="panel panel-default panel-intro">
    <div class="panel-heading">
        <div class="panel-lead"><em>观看统计</em></div>
    </div>

    <div class="panel-body">
        <div class="row" style="margin-bottom:15px;">
            <div class="col-xs-12 col-sm-6">
                <label>开始日期:</label>
                <input type="text" id="start_date" class="form-control datetimepicker" value="{$start_date}" data-date-format="YYYY-MM-DD">
            </div>
            <div class="col-xs-12 col-sm-6">
                <label>结束日期:</label>
                <input type="text" id="end_date" class="form-control datetimepicker" value="{$end_date}" data-date-format="YYYY-MM-DD">
            </div>
        </div>
        
        <div id="statistics-content">
            <div class="row">
                <div class="col-md-3">
                    <div class="panel panel-info">
                        <div class="panel-heading">总观看次数</div>
                        <div class="panel-body text-center">
                            <h2 id="total-watches">-</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="panel panel-success">
                        <div class="panel-heading">独立用户数</div>
                        <div class="panel-body text-center">
                            <h2 id="unique-users">-</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="panel panel-warning">
                        <div class="panel-heading">观看视频数</div>
                        <div class="panel-body text-center">
                            <h2 id="unique-videos">-</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="panel panel-danger">
                        <div class="panel-heading">发放金币</div>
                        <div class="panel-body text-center">
                            <h2 id="total-coin">-</h2>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="panel panel-default">
                        <div class="panel-heading">热门视频 TOP 10</div>
                        <div class="panel-body">
                            <table class="table table-striped">
                                <thead><tr><th>排名</th><th>视频</th><th>观看次数</th><th>发放金币</th></tr></thead>
                                <tbody id="hot-videos"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="panel panel-default">
                        <div class="panel-heading">活跃用户 TOP 10</div>
                        <div class="panel-body">
                            <table class="table table-striped">
                                <thead><tr><th>排名</th><th>用户</th><th>观看次数</th><th>获得金币</th></tr></thead>
                                <tbody id="active-users"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

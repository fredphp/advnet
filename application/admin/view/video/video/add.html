<form id="add-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Title')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-title" data-rule="required" class="form-control" name="row[title]" type="text" value="" placeholder="请输入视频标题">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">封面图片:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="input-group">
                <input id="c-cover_url" class="form-control" size="50" name="row[cover_url]" type="text" value="" placeholder="封面图片URL">
                <div class="input-group-addon no-border no-padding">
                    <span><button type="button" id="faupload-cover_url" class="btn btn-danger faupload" data-input-id="c-cover_url" data-mimetype="image/*" data-preview-id="p-cover_url"><i class="fa fa-upload"></i> {:__('Upload')}</button></span>
                    <span><button type="button" id="fachoose-cover_url" class="btn btn-primary fachoose" data-input-id="c-cover_url" data-mimetype="image/*"><i class="fa fa-list"></i> {:__('Choose')}</button></span>
                </div>
            </div>
            <ul class="row list-inline faupload-preview" id="p-cover_url"></ul>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">视频文件:</label>
        <div class="col-xs-12 col-sm-8">
            <ul class="nav nav-tabs" role="tablist">
                <li role="presentation" class="active">
                    <a href="#tab-upload" aria-controls="tab-upload" role="tab" data-toggle="tab">上传视频</a>
                </li>
                <li role="presentation">
                    <a href="#tab-url" aria-controls="tab-url" role="tab" data-toggle="tab">视频链接</a>
                </li>
            </ul>
            <div class="tab-content" style="margin-top: 10px;">
                <div role="tabpanel" class="tab-pane active" id="tab-upload">
                    <div class="input-group">
                        <input id="c-video_url_upload" class="form-control" name="row[video_url]" type="text" value="" placeholder="点击上传按钮上传视频" readonly>
                        <div class="input-group-addon no-border no-padding">
                            <span><button type="button" id="faupload-video" class="btn btn-danger faupload-video" data-input-id="c-video_url_upload" data-mimetype="video/mp4,video/quicktime,video/x-msvideo,video/webm" data-maxsize="500mb"><i class="fa fa-upload"></i> 上传视频</button></span>
                        </div>
                    </div>
                    <span class="help-block">支持 MP4, MOV, AVI, WebM 格式，最大 500MB</span>
                </div>
                <div role="tabpanel" class="tab-pane" id="tab-url">
                    <input id="c-video_url_link" class="form-control" name="row[video_url_link]" type="text" value="" placeholder="请输入视频完整URL地址，如：https://example.com/video.mp4">
                    <span class="help-block">请输入视频的完整URL地址</span>
                </div>
            </div>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">视频时长:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="input-group">
                <input id="c-duration" class="form-control" name="row[duration]" type="number" value="0" placeholder="视频时长（秒）">
                <span class="input-group-addon">秒</span>
            </div>
            <span class="help-block">上传视频后会自动获取时长</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">视频描述:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea id="c-description" class="form-control" name="row[description]" rows="3" placeholder="请输入视频描述"></textarea>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">分类:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-category_id" class="form-control selectpicker" name="row[category_id]" data-live-search="true">
                <option value="">请选择分类</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">奖励设置:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="row">
                <div class="col-xs-6">
                    <div class="input-group">
                        <span class="input-group-addon">奖励金币</span>
                        <input id="c-reward_coin" class="form-control" name="row[reward_coin]" type="number" value="100" step="0.01">
                    </div>
                </div>
                <div class="col-xs-6">
                    <div class="input-group">
                        <span class="input-group-addon">观看秒数</span>
                        <input id="c-reward_duration" class="form-control" name="row[reward_duration]" type="number" value="30">
                        <span class="input-group-addon">秒</span>
                    </div>
                </div>
            </div>
            <span class="help-block">用户观看指定秒数后可获得奖励金币</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">发布者:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-user_id" class="form-control selectpicker" name="row[user_id]" data-live-search="true">
                <option value="">平台发布</option>
                {foreach name="authorList" item="vo" key="k"}
                <option value="{$k}">{$vo}</option>
                {/foreach}
            </select>
            <span class="help-block">不选择发布者则为"平台发布"，可输入关键字搜索</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">标签:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-tags" class="form-control" name="row[tags]" type="text" value="" placeholder="多个标签用逗号分隔，如：搞笑,生活,美食">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-status" class="form-control" name="row[status]">
                <option value="4">草稿</option>
                <option value="0">待审核</option>
                <option value="1" selected>已发布</option>
                <option value="2">已下架</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">推荐设置:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="checkbox">
                <label><input type="checkbox" name="row[is_recommend]" value="1"> 设为推荐</label>
                <label><input type="checkbox" name="row[is_hot]" value="1"> 设为热门</label>
                <label><input type="checkbox" name="row[is_original]" value="1" checked> 原创内容</label>
            </div>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>

<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        {:build_toolbar('refresh,add,edit,del')}
                        <div class="dropdown btn-group">
                            <a class="btn btn-info dropdown-toggle" data-toggle="dropdown">
                                {:__('Status')} <span class="caret"></span>
                            </a>
                            <ul class="dropdown-menu">
                                <li><a href="javascript:;" data-field="status" data-value="1">已发布</a></li>
                                <li><a href="javascript:;" data-field="status" data-value="0">待审核</a></li>
                                <li><a href="javascript:;" data-field="status" data-value="2">已下架</a></li>
                                <li><a href="javascript:;" data-field="status" data-value="3">已封禁</a></li>
                            </ul>
                        </div>
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('video/video/edit')}"
                           data-operate-del="{:$auth->check('video/video/del')}"
                           width="100%">
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

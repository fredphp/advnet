<form id="withdraw-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">提现开关:</label>
        <div class="col-xs-12 col-sm-8">
            <select class="form-control" name="row[withdraw_enabled]">
                <option value="1" {if $configs.withdraw_enabled=='1'}selected{/if}>开启</option>
                <option value="0" {if $configs.withdraw_enabled=='0'}selected{/if}>关闭</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">最低提现金额:</label>
        <div class="col-xs-12 col-sm-8">
            <input class="form-control" name="row[withdraw_min_amount]" type="number" step="0.01" value="{$configs.withdraw_min_amount}" data-rule="required">
            <span class="help-block">用户最低提现金额（元）</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">最大提现金额:</label>
        <div class="col-xs-12 col-sm-8">
            <input class="form-control" name="row[withdraw_max_amount]" type="number" step="0.01" value="{$configs.withdraw_max_amount}" data-rule="required">
            <span class="help-block">用户单次最大提现金额（元）</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">每日提现次数:</label>
        <div class="col-xs-12 col-sm-8">
            <input class="form-control" name="row[withdraw_daily_limit]" type="number" value="{$configs.withdraw_daily_limit}" data-rule="required">
            <span class="help-block">用户每日提现次数上限</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">提现手续费率:</label>
        <div class="col-xs-12 col-sm-8">
            <input class="form-control" name="row[withdraw_fee_rate]" type="number" step="0.001" value="{$configs.withdraw_fee_rate}" data-rule="required">
            <span class="help-block">手续费比例，如0.01表示1%</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">提现审核:</label>
        <div class="col-xs-12 col-sm-8">
            <select class="form-control" name="row[withdraw_audit_enabled]">
                <option value="1" {if $configs.withdraw_audit_enabled=='1'}selected{/if}>需要审核</option>
                <option value="0" {if $configs.withdraw_audit_enabled=='0'}selected{/if}>自动通过</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">自动打款:</label>
        <div class="col-xs-12 col-sm-8">
            <select class="form-control" name="row[withdraw_auto_pay]">
                <option value="1" {if $configs.withdraw_auto_pay=='1'}selected{/if}>开启</option>
                <option value="0" {if $configs.withdraw_auto_pay=='0'}selected{/if}>关闭</option>
            </select>
            <span class="help-block">审核通过后自动打款到用户账户</span>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>

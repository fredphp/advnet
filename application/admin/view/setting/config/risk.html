<form id="risk-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">风控开关:</label>
        <div class="col-xs-12 col-sm-8">
            <select class="form-control" name="row[risk_enabled]">
                <option value="1" {if $configs.risk_enabled=='1'}selected{/if}>开启</option>
                <option value="0" {if $configs.risk_enabled=='0'}selected{/if}>关闭</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">自动封禁:</label>
        <div class="col-xs-12 col-sm-8">
            <select class="form-control" name="row[risk_auto_ban]">
                <option value="1" {if $configs.risk_auto_ban=='1'}selected{/if}>开启</option>
                <option value="0" {if $configs.risk_auto_ban=='0'}selected{/if}>关闭</option>
            </select>
            <span class="help-block">风险分数超过阈值自动封禁用户</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">封禁阈值:</label>
        <div class="col-xs-12 col-sm-8">
            <input class="form-control" name="row[risk_ban_threshold]" type="number" value="{$configs.risk_ban_threshold}" data-rule="required">
            <span class="help-block">风险分数超过此值将被封禁</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">冻结阈值:</label>
        <div class="col-xs-12 col-sm-8">
            <input class="form-control" name="row[risk_freeze_threshold]" type="number" value="{$configs.risk_freeze_threshold}" data-rule="required">
            <span class="help-block">风险分数超过此值将被冻结提现</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">分数衰减率:</label>
        <div class="col-xs-12 col-sm-8">
            <input class="form-control" name="row[risk_score_decay]" type="number" step="0.01" value="{$configs.risk_score_decay}" data-rule="required">
            <span class="help-block">每天风险分数自动衰减的比例</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">模拟器拦截:</label>
        <div class="col-xs-12 col-sm-8">
            <select class="form-control" name="row[emulator_block]">
                <option value="1" {if $configs.emulator_block=='1'}selected{/if}>开启</option>
                <option value="0" {if $configs.emulator_block=='0'}selected{/if}>关闭</option>
            </select>
            <span class="help-block">检测到模拟器使用时拦截请求</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">Hook拦截:</label>
        <div class="col-xs-12 col-sm-8">
            <select class="form-control" name="row[hook_block]">
                <option value="1" {if $configs.hook_block=='1'}selected{/if}>开启</option>
                <option value="0" {if $configs.hook_block=='0'}selected{/if}>关闭</option>
            </select>
            <span class="help-block">检测到Hook框架时拦截请求</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">代理检测:</label>
        <div class="col-xs-12 col-sm-8">
            <select class="form-control" name="row[proxy_detect]">
                <option value="1" {if $configs.proxy_detect=='1'}selected{/if}>开启</option>
                <option value="0" {if $configs.proxy_detect=='0'}selected{/if}>关闭</option>
            </select>
            <span class="help-block">检测用户是否使用代理</span>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>

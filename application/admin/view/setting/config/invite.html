<form id="invite-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">邀请开关:</label>
        <div class="col-xs-12 col-sm-8">
            <select class="form-control" name="row[invite_enabled]">
                <option value="1" {if $configs.invite_enabled=='1'}selected{/if}>开启</option>
                <option value="0" {if $configs.invite_enabled=='0'}selected{/if}>关闭</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">一级邀请奖励:</label>
        <div class="col-xs-12 col-sm-8">
            <input class="form-control" name="row[invite_level1_reward]" type="number" value="{$configs.invite_level1_reward}" data-rule="required">
            <span class="help-block">邀请一级好友奖励的金币数量</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">二级邀请奖励:</label>
        <div class="col-xs-12 col-sm-8">
            <input class="form-control" name="row[invite_level2_reward]" type="number" value="{$configs.invite_level2_reward}" data-rule="required">
            <span class="help-block">邀请二级好友奖励的金币数量</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">分佣开关:</label>
        <div class="col-xs-12 col-sm-8">
            <select class="form-control" name="row[invite_commission_enabled]">
                <option value="1" {if $configs.invite_commission_enabled=='1'}selected{/if}>开启</option>
                <option value="0" {if $configs.invite_commission_enabled=='0'}selected{/if}>关闭</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">一级分佣比例:</label>
        <div class="col-xs-12 col-sm-8">
            <input class="form-control" name="row[invite_level1_rate]" type="number" step="0.01" value="{$configs.invite_level1_rate}" data-rule="required">
            <span class="help-block">一级好友消费时的分佣比例，如0.1表示10%</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">二级分佣比例:</label>
        <div class="col-xs-12 col-sm-8">
            <input class="form-control" name="row[invite_level2_rate]" type="number" step="0.01" value="{$configs.invite_level2_rate}" data-rule="required">
            <span class="help-block">二级好友消费时的分佣比例，如0.05表示5%</span>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>

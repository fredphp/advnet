<form id="add-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Name')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-name" class="form-control" name="row[name]" type="text" placeholder="配置名称，如：0-12点配置">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">今日金额范围:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="row">
                <div class="col-xs-6">
                    <input id="c-min_amount" class="form-control" name="row[min_amount]" type="number" value="0" placeholder="最小金额">
                </div>
                <div class="col-xs-6">
                    <input id="c-max_amount" class="form-control" name="row[max_amount]" type="number" value="0" placeholder="最大金额">
                </div>
            </div>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">时间段（小时）:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="row">
                <div class="col-xs-6">
                    <input id="c-start_time" class="form-control" name="row[start_time]" type="number" value="0" min="0" max="23" placeholder="开始时间">
                </div>
                <div class="col-xs-6">
                    <input id="c-end_time" class="form-control" name="row[end_time]" type="number" value="24" min="1" max="24" placeholder="结束时间">
                </div>
            </div>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">基础金额范围:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="row">
                <div class="col-xs-6">
                    <input id="c-base_min" class="form-control" name="row[base_min]" type="number" value="0" placeholder="最小值">
                </div>
                <div class="col-xs-6">
                    <input id="c-base_max" class="form-control" name="row[base_max]" type="number" value="0" placeholder="最大值">
                </div>
            </div>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">累加金额范围:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="row">
                <div class="col-xs-6">
                    <input id="c-accumulate_min" class="form-control" name="row[accumulate_min]" type="number" value="0" placeholder="最小值">
                </div>
                <div class="col-xs-6">
                    <input id="c-accumulate_max" class="form-control" name="row[accumulate_max]" type="number" value="0" placeholder="最大值">
                </div>
            </div>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">封顶金额:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-max_reward" class="form-control" name="row[max_reward]" type="number" value="50000" placeholder="红包最大金额">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-status" class="form-control" name="row[status]">
                {foreach name="statusList" item="vo" key="k"}
                <option value="{$k}" {in name="k" value="1"}selected{/in}>{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-success btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>

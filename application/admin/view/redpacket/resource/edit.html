<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">资源类型:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-type" class="form-control" name="row[type]" data-rule="required">
                {foreach name="typeList" item="vo" key="k"}
                <option value="{$k}" {if $row.type==$k}selected{/if}>{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">资源名称:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-name" class="form-control" name="row[name]" type="text" value="{$row.name}" data-rule="required">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">资源描述:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea id="c-description" class="form-control" name="row[description]" rows="3">{$row.description}</textarea>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">资源图标:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="input-group">
                <input id="c-logo" class="form-control" name="row[logo]" type="text" value="{$row.logo}">
                <div class="input-group-addon no-border no-padding">
                    <span><button type="button" id="faupload-logo" class="btn btn-danger faupload" data-input-id="c-logo" data-mimetype="image/*" data-preview-id="p-logo"><i class="fa fa-upload"></i> {:__('Upload')}</button></span>
                    <span><button type="button" id="fachoose-logo" class="btn btn-primary fachoose" data-input-id="c-logo" data-mimetype="image/*"><i class="fa fa-list"></i> {:__('Choose')}</button></span>
                </div>
            </div>
            <ul class="row list-inline faupload-preview" id="p-logo"></ul>
        </div>
    </div>
    
    <!-- App类型特有字段 -->
    <div class="form-group type-field type-app" {if $row.type!='app'}style="display:none;"{/if}>
        <label class="control-label col-xs-12 col-sm-2">下载链接:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-url" class="form-control" name="row[url]" type="text" value="{$row.url}">
        </div>
    </div>
    <div class="form-group type-field type-app" {if $row.type!='app'}style="display:none;"{/if}>
        <label class="control-label col-xs-12 col-sm-2">App包名:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-package_name" class="form-control" name="row[package_name]" type="text" value="{$row.package_name}">
        </div>
    </div>
    
    <!-- 小程序类型特有字段 -->
    <div class="form-group type-field type-mini_program" {if $row.type!='mini_program'}style="display:none;"{/if}>
        <label class="control-label col-xs-12 col-sm-2">小程序AppID:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-app_id" class="form-control" name="row[app_id]" type="text" value="{$row.app_id}">
        </div>
    </div>
    
    <!-- 游戏类型特有字段 -->
    <div class="form-group type-field type-game" {if $row.type!='game'}style="display:none;"{/if}>
        <label class="control-label col-xs-12 col-sm-2">游戏ID:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-game_id" class="form-control" name="row[app_id]" type="text" value="{$row.app_id}">
        </div>
    </div>
    
    <!-- 视频类型特有字段 -->
    <div class="form-group type-field type-video" {if $row.type!='video'}style="display:none;"{/if}>
        <label class="control-label col-xs-12 col-sm-2">视频ID:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-video_id" class="form-control" name="row[video_id]" type="number" value="{$row.video_id}">
        </div>
    </div>
    
    <!-- 分享链接类型特有字段 -->
    <div class="form-group type-field type-link" {if $row.type!='link'}style="display:none;"{/if}>
        <label class="control-label col-xs-12 col-sm-2">链接地址:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-link_url" class="form-control" name="row[url]" type="text" value="{$row.url}">
        </div>
    </div>
    
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">排序:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-sort" class="form-control" name="row[sort]" type="number" value="{$row.sort}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-status" class="form-control" name="row[status]">
                <option value="1" {if $row.status==1}selected{/if}>启用</option>
                <option value="0" {if $row.status==0}selected{/if}>禁用</option>
            </select>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>
<script>
$(function() {
    // 根据资源类型显示/隐藏对应字段
    $('#c-type').on('change', function() {
        var type = $(this).val();
        $('.type-field').hide();
        $('.type-' + type).show();
    });
});
</script>

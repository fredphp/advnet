<form id="add-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">资源类型:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-type" class="form-control" name="row[type]" data-rule="required">
                {foreach name="typeList" item="vo" key="k"}
                <option value="{$k}">{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">资源名称:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-name" class="form-control" name="row[name]" type="text" placeholder="请输入资源名称" data-rule="required">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">资源描述:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea id="c-description" class="form-control" name="row[description]" rows="3" placeholder="请输入资源描述"></textarea>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">资源图标:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="input-group">
                <input id="c-logo" class="form-control" name="row[logo]" type="text" placeholder="资源图标URL">
                <div class="input-group-addon no-border no-padding">
                    <span><button type="button" id="faupload-logo" class="btn btn-danger faupload" data-input-id="c-logo" data-mimetype="image/*" data-preview-id="p-logo"><i class="fa fa-upload"></i> {:__('Upload')}</button></span>
                    <span><button type="button" id="fachoose-logo" class="btn btn-primary fachoose" data-input-id="c-logo" data-mimetype="image/*"><i class="fa fa-list"></i> {:__('Choose')}</button></span>
                </div>
            </div>
            <ul class="row list-inline faupload-preview" id="p-logo"></ul>
        </div>
    </div>
    
    <!-- App类型特有字段 -->
    <div class="form-group type-field type-app">
        <label class="control-label col-xs-12 col-sm-2">下载链接:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-url" class="form-control" name="row[url]" type="text" placeholder="App下载链接">
        </div>
    </div>
    <div class="form-group type-field type-app">
        <label class="control-label col-xs-12 col-sm-2">App包名:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-package_name" class="form-control" name="row[package_name]" type="text" placeholder="如: com.example.app">
        </div>
    </div>
    
    <!-- 小程序类型特有字段 -->
    <div class="form-group type-field type-mini_program" style="display:none;">
        <label class="control-label col-xs-12 col-sm-2">小程序AppID:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-app_id" class="form-control" name="row[app_id]" type="text" placeholder="小程序AppID">
        </div>
    </div>
    
    <!-- 游戏类型特有字段 -->
    <div class="form-group type-field type-game" style="display:none;">
        <label class="control-label col-xs-12 col-sm-2">游戏ID:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-game_id" class="form-control" name="row[app_id]" type="text" placeholder="游戏ID">
        </div>
    </div>
    
    <!-- 视频类型特有字段 -->
    <div class="form-group type-field type-video" style="display:none;">
        <label class="control-label col-xs-12 col-sm-2">视频ID:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-video_id" class="form-control" name="row[video_id]" type="number" placeholder="视频ID">
        </div>
    </div>
    
    <!-- 分享链接类型特有字段 -->
    <div class="form-group type-field type-link" style="display:none;">
        <label class="control-label col-xs-12 col-sm-2">链接地址:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-link_url" class="form-control" name="row[url]" type="text" placeholder="分享链接地址">
        </div>
    </div>
    
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">排序:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-sort" class="form-control" name="row[sort]" type="number" value="0">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-status" class="form-control" name="row[status]">
                <option value="1" selected>启用</option>
                <option value="0">禁用</option>
            </select>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>
<script>
$(function() {
    // 根据资源类型显示/隐藏对应字段
    $('#c-type').on('change', function() {
        var type = $(this).val();
        $('.type-field').hide();
        $('.type-' + type).show();
    });
    
    // 初始化显示
    $('#c-type').trigger('change');
});
</script>

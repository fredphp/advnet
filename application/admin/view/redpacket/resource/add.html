<form id="add-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">资源名称:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-name" class="form-control" name="row[name]" type="text" placeholder="如：三国群英纪" required>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">资源描述:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea id="c-description" class="form-control" name="row[description]" rows="2" placeholder="资源简介"></textarea>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">资源图标:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="input-group">
                <input id="c-logo" class="form-control" name="row[logo]" type="text" placeholder="资源图标URL">
                <div class="input-group-addon no-border no-padding">
                    <span><button type="button" id="faupload-logo" class="btn btn-danger faupload" data-input-id="c-logo" data-mimetype="image/*" data-multiple="false" data-preview-id="p-logo"><i class="fa fa-upload"></i> {:__('Upload')}</button></span>
                    <span><button type="button" id="fachoose-logo" class="btn btn-primary fachoose" data-input-id="c-logo" data-mimetype="image/*" data-multiple="false"><i class="fa fa-list"></i> {:__('Choose')}</button></span>
                </div>
                <span class="msg-box n-right" for="c-logo"></span>
            </div>
            <ul class="row list-inline faupload-preview" id="p-logo"></ul>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">资源类型:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-type" class="form-control selectpicker" name="row[type]">
                {foreach name="typeList" item="vo" key="k"}
                <option value="{$k}" {if $k=='miniapp'}selected{/if}>{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>
    
    <!-- 小程序配置 -->
    <div class="form-group type-config type-miniapp type-game">
        <label class="control-label col-xs-12 col-sm-2">小程序AppID:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-miniapp_id" class="form-control" name="row[miniapp_id]" type="text" placeholder="wx1234567890abcdef">
        </div>
    </div>
    <div class="form-group type-config type-miniapp type-game">
        <label class="control-label col-xs-12 col-sm-2">小程序页面路径:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-miniapp_path" class="form-control" name="row[miniapp_path]" type="text" placeholder="pages/index/index">
        </div>
    </div>
    <div class="form-group type-config type-miniapp type-game">
        <label class="control-label col-xs-12 col-sm-2">小程序类型:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-miniapp_type" class="form-control selectpicker" name="row[miniapp_type]">
                <option value="release">正式版</option>
                <option value="trial">体验版</option>
                <option value="develop">开发版</option>
            </select>
        </div>
    </div>
    
    <!-- 下载配置 -->
    <div class="form-group type-config type-download" style="display:none;">
        <label class="control-label col-xs-12 col-sm-2">下载链接:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-download_url" class="form-control" name="row[download_url]" type="text" placeholder="https://example.com/app.apk">
        </div>
    </div>
    <div class="form-group type-config type-download" style="display:none;">
        <label class="control-label col-xs-12 col-sm-2">下载类型:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-download_type" class="form-control selectpicker" name="row[download_type]">
                <option value="android">Android</option>
                <option value="ios">iOS</option>
            </select>
        </div>
    </div>
    <div class="form-group type-config type-download" style="display:none;">
        <label class="control-label col-xs-12 col-sm-2">包名:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-package_name" class="form-control" name="row[package_name]" type="text" placeholder="com.example.app">
        </div>
    </div>
    
    <!-- 视频配置 -->
    <div class="form-group type-config type-video" style="display:none;">
        <label class="control-label col-xs-12 col-sm-2">视频链接:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-video_url" class="form-control" name="row[video_url]" type="text" placeholder="https://example.com/video.mp4">
        </div>
    </div>
    <div class="form-group type-config type-video" style="display:none;">
        <label class="control-label col-xs-12 col-sm-2">视频时长(秒):</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-video_duration" class="form-control" name="row[video_duration]" type="number" min="0" value="0">
        </div>
    </div>
    
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-status" class="form-control selectpicker" name="row[status]">
                {foreach name="statusList" item="vo" key="k"}
                <option value="{$k}" {if $k=='normal'}selected{/if}>{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-success btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>

<script>
$(function() {
    $('#c-type').on('changed.bs.select', function(e) {
        var type = $(this).val();
        $('.type-config').hide();
        if (type == 'miniapp' || type == 'game') {
            $('.type-miniapp, .type-game').show();
        } else if (type == 'download') {
            $('.type-download').show();
        } else if (type == 'video') {
            $('.type-video').show();
        }
    });
});
</script>

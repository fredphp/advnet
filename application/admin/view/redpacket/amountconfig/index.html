<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        <a href="javascript:;" class="btn btn-primary btn-refresh" title="{:__('Refresh')}" ><i class="fa fa-refresh"></i> </a>
                        <a href="javascript:;" class="btn btn-success btn-add {:$auth->check('redpacket/amountconfig/add')?'':'hide'}" title="{:__('Add')}" ><i class="fa fa-plus"></i> {:__('Add')}</a>
                        <a href="javascript:;" class="btn btn-danger btn-del btn-disabled disabled {:$auth->check('redpacket/amountconfig/del')?'':'hide'}" title="{:__('Delete')}" ><i class="fa fa-trash"></i> {:__('Delete')}</a>

                        <div class="dropdown btn-group {:$auth->check('redpacket/amountconfig/multi')?'':'hide'}">
                            <a class="btn btn-primary btn-more dropdown-toggle btn-disabled disabled" data-toggle="dropdown"><i class="fa fa-cog"></i> {:__('More')}</a>
                            <ul class="dropdown-menu text-left" role="menu">
                                <li><a class="btn btn-link btn-multi btn-disabled disabled" href="javascript:;" data-params="status=normal"><i class="fa fa-eye"></i> {:__('Set to normal')}</a></li>
                                <li><a class="btn btn-link btn-multi btn-disabled disabled" href="javascript:;" data-params="status=hidden"><i class="fa fa-eye-slash"></i> {:__('Set to hidden')}</a></li>
                            </ul>
                        </div>

                        <div class="dropdown btn-group">
                            <button type="button" class="btn btn-default dropdown-toggle" data-toggle="dropdown">
                                <i class="fa fa-filter"></i> 筛选类型
                                <span class="caret"></span>
                            </button>
                            <ul class="dropdown-menu" role="menu">
                                <li><a href="javascript:;" onclick="$.fn.bootstrapTable.defaults.refresh('', {query: {filter: {config_type: ''}}}">全部类型</a></li>
                                <li class="divider"></li>
                                <li><a href="javascript:;" onclick="$.fn.bootstrapTable.defaults.refresh('', {query: {filter: {config_type: 'new_user'}}}">新用户红包</a></li>
                                <li><a href="javascript:;" onclick="$.fn.bootstrapTable.defaults.refresh('', {query: {filter: {config_type: 'base_amount'}}}">基础额度</a></li>
                                <li><a href="javascript:;" onclick="$.fn.bootstrapTable.defaults.refresh('', {query: {filter: {config_type: 'accumulate_amount'}}}">累加额度</a></li>
                            </ul>
                        </div>
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('redpacket/amountconfig/edit')}"
                           data-operate-del="{:$auth->check('redpacket/amountconfig/del')}"
                           width="100%">
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

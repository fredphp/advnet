<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">任务名称:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-name" class="form-control" name="row[name]" type="text" value="{$row.name}" required>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">任务描述:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea id="c-description" class="form-control" name="row[description]" rows="3">{$row.description}</textarea>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">任务类型:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-task_type" class="form-control selectpicker" name="row[task_type]" data-init-type="{$row.task_type}">
                {foreach name="typeList" item="vo" key="k"}
                <option value="{$k}" {if $k==$row.task_type}selected{/if}>{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>

    <!-- 资源选择区域 -->
    <div class="form-group resource-select-area">
        <label class="control-label col-xs-12 col-sm-2">关联资源:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-resource_id" class="form-control" name="row[resource_id]" type="text" value="{$row.resource_id}" placeholder="请选择关联资源" data-init-task-type="{$row.task_type}">
            <span class="help-block resource-type-tip">选择任务类型后，可根据类型筛选资源</span>
        </div>
    </div>

    <!-- 资源信息展示区域 -->
    <div class="form-group resource-info-area" style="display:none;">
        <label class="control-label col-xs-12 col-sm-2">资源信息:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="well well-sm" style="padding:10px;">
                <div class="media">
                    <div class="media-left">
                        <img id="resource-logo" src="" style="width:48px;height:48px;border-radius:8px;">
                    </div>
                    <div class="media-body">
                        <h5 id="resource-name" class="media-heading"></h5>
                        <p id="resource-description" class="text-muted small"></p>
                        <p id="resource-extra" class="text-info small"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">总金额(金币):</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-total_amount" class="form-control" name="row[total_amount]" type="number" step="0.01" min="0.01" value="{$row.total_amount}" required>
            <span class="help-block">已发放: {$row.total_amount - $row.remain_amount} | 剩余: {$row.remain_amount}</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">红包数量:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-total_count" class="form-control" name="row[total_count]" type="number" min="1" value="{$row.total_count}" required>
            <span class="help-block">已领取: {$row.total_count - $row.remain_count} | 剩余: {$row.remain_count}</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">状态:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-status" class="form-control selectpicker" name="row[status]">
                {foreach name="statusList" item="vo" key="k"}
                <option value="{$k}" {if $k==$row.status}selected{/if}>{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-success btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>

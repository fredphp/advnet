<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">任务名称:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-name" class="form-control" name="row[name]" type="text" value="{$row.name}" placeholder="任务名称" required>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">展示标题:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-display_title" class="form-control" name="row[display_title]" type="text" value="{$row.display_title}" placeholder="展示标题（可选，不填则使用资源名称）">
            <span class="help-block">前端展示的标题，如下载App时显示的应用名称。留空则使用关联资源的名称</span>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">任务描述:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea id="c-description" class="form-control" name="row[description]" rows="3" placeholder="任务描述">{$row.description}</textarea>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">展示描述:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea id="c-display_description" class="form-control" name="row[display_description]" rows="2" placeholder="展示描述（可选）">{$row.display_description}</textarea>
            <span class="help-block">前端展示的详细描述。留空则使用关联资源的描述</span>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">任务类型:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-type" class="form-control selectpicker" name="row[type]" required>
                {foreach name="typeList" item="vo" key="k"}
                <option value="{$k}" {in_array($k,[$row.type])}selected{/in_array}>{$vo}</option>
                {/foreach}
            </select>
            <span class="help-block type-tip">
                <strong>小程序游戏</strong>：前端显示红包，用户点击可累计红包金额<br>
                <strong>其他类型</strong>：前端显示文字/广告卡片，点击跳转对应链接
            </span>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">是否显示红包:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-show_red_packet" class="form-control selectpicker" name="row[show_red_packet]">
                <option value="0" {in_array(0,[$row.show_red_packet])}selected{/in_array}>否</option>
                <option value="1" {in_array(1,[$row.show_red_packet])}selected{/in_array}>是</option>
            </select>
            <span class="help-block">默认只有"小程序游戏"类型显示红包，可手动控制</span>
        </div>
    </div>

    <!-- 资源选择区域 -->
    <div class="form-group resource-select-area">
        <label class="control-label col-xs-12 col-sm-2">关联资源:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-resource_id" class="form-control" name="row[resource_id]" type="text" value="{$row.resource_id}" placeholder="请选择关联资源">
            <span class="help-block resource-type-tip">选择资源后，将使用资源中的图标、背景图、跳转链接等信息</span>
        </div>
    </div>

    <!-- 资源信息展示区域 -->
    <div class="form-group resource-info-area" style="display:none;">
        <label class="control-label col-xs-12 col-sm-2">资源信息:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="well well-sm" style="padding:10px;">
                <div class="media">
                    <div class="media-left">
                        <img id="resource-logo" src="" style="width:48px;height:48px;border-radius:8px;">
                    </div>
                    <div class="media-body">
                        <h5 id="resource-name" class="media-heading"></h5>
                        <p id="resource-description" class="text-muted small"></p>
                        <p id="resource-extra" class="text-info small"></p>
                    </div>
                </div>
            </div>
            <span class="help-block text-info">背景图、跳转链接等信息将使用关联资源中的配置</span>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">每日最大点击次数:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-max_click_per_day" class="form-control" name="row[max_click_per_day]" type="number" min="1" value="{$row.max_click_per_day|default='10'}" placeholder="每日最大点击次数">
            <span class="help-block">用户每天可以点击红包的最大次数，用于累计金额</span>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">状态:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-status" class="form-control selectpicker" name="row[status]">
                {foreach name="statusList" item="vo" key="k"}
                <option value="{$k}" {in_array($k,[$row.status])}selected{/in_array}>{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>

    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-success btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>

<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Name')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-name" class="form-control" name="row[name]" type="text" value="{$row.name}" required>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Description')}:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea id="c-description" class="form-control" name="row[description]" rows="3">{$row.description}</textarea>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Type')}:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-type" class="form-control selectpicker" name="row[type]">
                {foreach name="typeList" item="vo" key="k"}
                <option value="{$k}" {if $k==$row.type}selected{/if}>{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">总金额:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="input-group">
                <span class="input-group-addon">¥</span>
                <input id="c-total_amount" class="form-control" name="row[total_amount]" type="number" step="0.01" min="0.01" value="{$row.total_amount}" required>
                <span class="input-group-addon">元</span>
            </div>
            <span class="help-block">已领取: ¥{$row.total_amount - $row.remain_amount} | 剩余: ¥{$row.remain_amount}</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">红包数量:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-total_count" class="form-control" name="row[total_count]" type="number" min="1" value="{$row.total_count}" required>
            <span class="help-block">已领取: {$row.total_count - $row.remain_count} | 剩余: {$row.remain_count}</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">关联资源:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-resource_id" class="form-control selectpicker" name="row[resource_id]" data-live-search="true">
                <option value="0">不关联资源</option>
                {foreach name="resourceList" item="vo" key="k"}
                <option value="{$k}" {if $k==$row.resource_id}selected{/if}>{$vo.name} ({$vo.type})</option>
                {/foreach}
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">状态:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-status" class="form-control selectpicker" name="row[status]">
                {foreach name="statusList" item="vo" key="k"}
                <option value="{$k}" {if $k==$row.status}selected{/if}>{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-success btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>

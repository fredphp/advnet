<form id="add-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">红包名称:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-name" class="form-control" name="row[name]" type="text" placeholder="请输入红包名称" data-rule="required">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">红包描述:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea id="c-description" class="form-control" name="row[description]" rows="3" placeholder="请输入红包描述"></textarea>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">任务类型:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-task_type" class="form-control" name="row[task_type]" data-rule="required">
                <option value="">请选择任务类型</option>
                {foreach name="typeList" item="vo" key="k"}
                <option value="{$k}">{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>
    
    <!-- 资源选择区域 -->
    <div class="form-group resource-select-area" style="display:none;">
        <label class="control-label col-xs-12 col-sm-2">选择资源:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-resource_id" class="form-control" name="row[resource_id]" 
                   type="text" 
                   value=""
                   placeholder="请选择资源">
            <span class="help-block resource-type-tip"></span>
        </div>
    </div>
    
    <!-- 资源信息展示区域 -->
    <div class="form-group resource-info-area" style="display:none;">
        <label class="control-label col-xs-12 col-sm-2">资源信息:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="panel panel-default" style="margin-bottom: 0;">
                <div class="panel-body" style="padding: 10px;">
                    <div class="media">
                        <div class="media-left">
                            <img id="resource-logo" src="/assets/img/avatar.png" style="width: 64px; height: 64px; object-fit: cover; border-radius: 8px;">
                        </div>
                        <div class="media-body">
                            <h5 id="resource-name" class="media-heading" style="margin-top: 0; margin-bottom: 5px;"></h5>
                            <p id="resource-description" class="text-muted" style="margin-bottom: 5px;"></p>
                            <p id="resource-extra" class="text-info small" style="margin-bottom: 0;"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">金额类型:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-amount_type" class="form-control" name="row[amount_type]" data-rule="required">
                <option value="fixed">固定金额</option>
                <option value="random">随机金额</option>
            </select>
        </div>
    </div>
    <div class="form-group amount-fixed">
        <label class="control-label col-xs-12 col-sm-2">单个金额(金币):</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-single_amount" class="form-control" name="row[single_amount]" type="number" value="100" step="0.01" min="0" placeholder="单个红包金额">
        </div>
    </div>
    <div class="form-group amount-random" style="display:none;">
        <label class="control-label col-xs-12 col-sm-2">金额范围(金币):</label>
        <div class="col-xs-12 col-sm-4">
            <input id="c-min_amount" class="form-control" name="row[min_amount]" type="number" value="0" step="0.01" min="0" placeholder="最小金额">
        </div>
        <div class="col-xs-12 col-sm-4">
            <input id="c-max_amount" class="form-control" name="row[max_amount]" type="number" value="0" step="0.01" min="0" placeholder="最大金额">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">红包总金额(金币):</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-total_amount" class="form-control" name="row[total_amount]" type="number" value="1000" step="0.01" min="0" data-rule="required" placeholder="红包总金额">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">红包数量:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-total_count" class="form-control" name="row[total_count]" type="number" value="10" min="1" data-rule="required" placeholder="红包总数量">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">要求时长(秒):</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-required_duration" class="form-control" name="row[required_duration]" type="number" value="0" min="0" placeholder="需要完成的时长，0表示不限制">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">每人可领次数:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-user_limit" class="form-control" name="row[user_limit]" type="number" value="1" min="1" placeholder="每人可领取次数">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">每日限制次数:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-daily_limit" class="form-control" name="row[daily_limit]" type="number" value="0" min="0" placeholder="每日限制领取次数，0表示不限制">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">用户等级限制:</label>
        <div class="col-xs-12 col-sm-4">
            <input id="c-user_level_min" class="form-control" name="row[user_level_min]" type="number" value="1" min="1" placeholder="最低等级">
        </div>
        <div class="col-xs-12 col-sm-4">
            <input id="c-user_level_max" class="form-control" name="row[user_level_max]" type="number" value="255" min="1" max="255" placeholder="最高等级(255=不限)">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">新用户限制:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="checkbox">
                <label><input type="checkbox" name="row[new_user_only]" value="1"> 仅限新用户</label>
            </div>
            <input id="c-new_user_days" class="form-control" name="row[new_user_days]" type="number" value="7" min="1" placeholder="注册天数内为新用户" style="margin-top:5px;">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">验证方式:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-verify_method" class="form-control" name="row[verify_method]">
                <option value="auto">自动验证</option>
                <option value="manual">人工审核</option>
                <option value="third_party">第三方验证</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">审核方式:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-audit_type" class="form-control" name="row[audit_type]">
                <option value="auto">自动审核</option>
                <option value="manual">人工审核</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">有效期(小时):</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-expire_hours" class="form-control" name="row[expire_hours]" type="number" value="24" min="1" placeholder="领取后有效期">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">活动时间:</label>
        <div class="col-xs-12 col-sm-4">
            <input id="c-start_time" class="form-control datetimepicker" name="row[start_time]" type="text" placeholder="开始时间" data-date-format="YYYY-MM-DD HH:mm:ss">
        </div>
        <div class="col-xs-12 col-sm-4">
            <input id="c-end_time" class="form-control datetimepicker" name="row[end_time]" type="text" placeholder="结束时间" data-date-format="YYYY-MM-DD HH:mm:ss">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-status" class="form-control" name="row[status]">
                <option value="0">禁用</option>
                <option value="1" selected>启用</option>
            </select>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>

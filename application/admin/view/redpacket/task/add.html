<form id="add-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">任务名称:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-name" class="form-control" name="row[name]" type="text" placeholder="任务名称" required>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">展示标题:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-display_title" class="form-control" name="row[display_title]" type="text" placeholder="展示标题（如：三国群英纪单机版）">
            <span class="help-block">前端展示的标题，如下载App时显示的应用名称</span>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">任务描述:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea id="c-description" class="form-control" name="row[description]" rows="3" placeholder="任务描述"></textarea>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">展示描述:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea id="c-display_description" class="form-control" name="row[display_description]" rows="2" placeholder="展示描述"></textarea>
            <span class="help-block">前端展示的详细描述</span>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">任务类型:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-type" class="form-control selectpicker" name="row[type]" required>
                <option value="chat" selected>普通聊天</option>
                <option value="download">下载App</option>
                <option value="miniapp">小程序游戏</option>
                <option value="adv">广告时长</option>
                <option value="video">观看视频</option>
            </select>
            <span class="help-block type-tip">
                <strong>小程序游戏</strong>：前端显示红包，用户点击可累计红包金额<br>
                <strong>其他类型</strong>：前端显示文字/广告卡片，点击跳转对应链接
            </span>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">是否显示红包:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-show_red_packet" class="form-control selectpicker" name="row[show_red_packet]">
                <option value="0">否</option>
                <option value="1" selected>是</option>
            </select>
            <span class="help-block">默认只有"小程序游戏"类型显示红包，可手动控制</span>
        </div>
    </div>

    <!-- 资源选择区域 -->
    <div class="form-group resource-select-area">
        <label class="control-label col-xs-12 col-sm-2">关联资源:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-resource_id" class="form-control" name="row[resource_id]" type="text" value="" placeholder="请选择关联资源">
            <span class="help-block resource-type-tip">选择任务类型后，可根据类型筛选资源</span>
        </div>
    </div>

    <!-- 资源信息展示区域 -->
    <div class="form-group resource-info-area" style="display:none;">
        <label class="control-label col-xs-12 col-sm-2">资源信息:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="well well-sm" style="padding:10px;">
                <div class="media">
                    <div class="media-left">
                        <img id="resource-logo" src="" style="width:48px;height:48px;border-radius:8px;">
                    </div>
                    <div class="media-body">
                        <h5 id="resource-name" class="media-heading"></h5>
                        <p id="resource-description" class="text-muted small"></p>
                        <p id="resource-extra" class="text-info small"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">背景图片:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="input-group">
                <input id="c-background_image" class="form-control" name="row[background_image]" type="text" value="" placeholder="背景图片">
                <div class="input-group-addon no-border no-padding">
                    <span><button type="button" id="faupload-background_image" class="btn btn-danger faupload" data-input-id="c-background_image" data-mimetype="image/*" data-multiple="false" data-preview-id="p-background_image"><i class="fa fa-upload"></i> {:__('Upload')}</button></span>
                    <span><button type="button" id="fachoose-background_image" class="btn btn-primary fachoose" data-input-id="c-background_image" data-mimetype="image/*" data-multiple="false"><i class="fa fa-list"></i> {:__('Choose')}</button></span>
                </div>
                <span class="msg-box n-right" for="c-background_image"></span>
            </div>
            <ul class="row list-inline faupload-preview" id="p-background_image"></ul>
            <span class="help-block">前端展示的背景图片</span>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">跳转链接:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-jump_url" class="form-control" name="row[jump_url]" type="text" placeholder="跳转链接">
            <span class="help-block">用户点击后跳转的链接，如下载App的下载地址</span>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">每日最大点击次数:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-max_click_per_day" class="form-control" name="row[max_click_per_day]" type="number" min="1" value="10" placeholder="每日最大点击次数">
            <span class="help-block">用户每天可以点击红包的最大次数，用于累计金额</span>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">状态:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-status" class="form-control selectpicker" name="row[status]">
                <option value="pending" selected>待发送</option>
                <option value="normal">进行中</option>
                <option value="finished">已抢完</option>
                <option value="expired">已过期</option>
            </select>
        </div>
    </div>

    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-success btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>

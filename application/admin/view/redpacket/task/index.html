<script>
// 定义类型列表变量供JS使用
var typeList = {:json_encode($typeList)};
</script>
<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        <a href="javascript:;" class="btn btn-primary btn-refresh" title="刷新"><i class="fa fa-refresh"></i></a>
                        <a href="javascript:;" class="btn btn-success btn-add" title="添加任务"><i class="fa fa-plus"></i> 添加任务</a>
                        <a href="javascript:;" class="btn btn-info btn-push btn-disabled disabled" title="推送任务"><i class="fa fa-paper-plane"></i> 推送任务</a>
                        <a href="javascript:;" class="btn btn-warning btn-message btn-disabled disabled" title="发送消息"><i class="fa fa-envelope"></i> 发送消息</a>
                        <a href="javascript:;" class="btn btn-danger btn-del btn-disabled disabled" title="删除"><i class="fa fa-trash"></i> 删除</a>
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('redpacket/task/edit')}"
                           data-operate-del="{:$auth->check('redpacket/task/del')}"
                           width="100%">
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 发送消息弹窗 -->
<script id="messagetpl" type="text/html">
<form id="message-form" class="form-horizontal">
    <input type="hidden" name="task_id" value="<%=task.id%>">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">任务名称:</label>
        <div class="col-xs-12 col-sm-8">
            <p class="form-control-static"><%=task.name%></p>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">消息标题:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="text" class="form-control" name="title" value="<%=defaultTitle%>" data-rule="required">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">消息内容:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea class="form-control" name="content" rows="4" data-rule="required"><%=defaultContent%></textarea>
        </div>
    </div>
</form>
</script>

<form id="message-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">关联任务:</label>
        <div class="col-xs-12 col-sm-8">
            <p class="form-control-static">
                <span class="label label-primary">{$task.task_type_text}</span>
                {$task.name}
            </p>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">消息标题:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="text" class="form-control" name="title" value="📢 任务通知：{$task.name}" data-rule="required">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">消息内容:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea class="form-control" name="content" rows="5" data-rule="required" placeholder="请输入要发送给用户的消息内容">亲爱的用户：

新的任务「{$task.name}」已上线！
完成任务可获得 {$task.single_amount} 金币奖励。

快去参与吧！</textarea>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">消息预览:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="panel panel-default" style="max-width: 300px;">
                <div class="panel-heading">
                    <i class="fa fa-envelope"></i> 消息预览
                </div>
                <div class="panel-body" id="message-preview">
                    <p><strong id="preview-title">📢 任务通知：{$task.name}</strong></p>
                    <p id="preview-content" style="white-space: pre-wrap;"></p>
                </div>
            </div>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>

<script>
$(function() {
    // 实时预览
    $('input[name="title"]').on('input', function() {
        $('#preview-title').text($(this).val() || '消息标题');
    });
    
    $('textarea[name="content"]').on('input', function() {
        $('#preview-content').text($(this).val() || '消息内容');
    });
    
    // 初始化预览
    $('#preview-content').text($('textarea[name="content"]').val());
});
</script>

<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        <a href="javascript:;" class="btn btn-primary btn-refresh" title="{:__('Refresh')}" ><i class="fa fa-refresh"></i> </a>
                        <a href="javascript:;" class="btn btn-success btn-add {:$auth->check('redpacket/timeconfig/add')?'':'hide'}" title="{:__('Add')}" ><i class="fa fa-plus"></i> {:__('Add')}</a>
                        <a href="javascript:;" class="btn btn-danger btn-del btn-disabled disabled {:$auth->check('redpacket/timeconfig/del')?'':'hide'}" title="{:__('Delete')}" ><i class="fa fa-trash"></i> {:__('Delete')}</a>

                        <div class="dropdown btn-group {:$auth->check('redpacket/timeconfig/multi')?'':'hide'}">
                            <a class="btn btn-primary btn-more dropdown-toggle btn-disabled disabled" data-toggle="dropdown"><i class="fa fa-cog"></i> {:__('More')}</a>
                            <ul class="dropdown-menu text-left" role="menu">
                                <li><a class="btn btn-link btn-multi btn-disabled disabled" href="javascript:;" data-params="status=normal"><i class="fa fa-eye"></i> 设为正常</a></li>
                                <li><a class="btn btn-link btn-multi btn-disabled disabled" href="javascript:;" data-params="status=hidden"><i class="fa fa-eye-slash"></i> 设为禁用</a></li>
                            </ul>
                        </div>
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('redpacket/timeconfig/edit')}"
                           data-operate-del="{:$auth->check('redpacket/timeconfig/del')}"
                           width="100%">
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="panel panel-info" style="margin-top:15px;">
    <div class="panel-heading">
        <h4 class="panel-title"><i class="fa fa-info-circle"></i> 时间段配置说明</h4>
    </div>
    <div class="panel-body">
        <ul class="list-unstyled">
            <li><strong>时间段：</strong>配置一天中不同时段的奖励金额，时间采用24小时制</li>
            <li><strong>基础奖励：</strong>老用户首次点击红包获得的金额区间</li>
            <li><strong>累加奖励：</strong>老用户后续点击红包累加的金额区间</li>
            <li><strong>新用户基础奖励：</strong>新用户首次点击红包获得的金额区间</li>
            <li><strong>新用户累加奖励：</strong>新用户后续点击红包累加的金额区间</li>
            <li><strong>注意：</strong>时间段不能重叠，系统会根据当前时间自动匹配对应的配置</li>
        </ul>
    </div>
</div>

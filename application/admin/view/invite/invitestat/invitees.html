<div class="panel panel-default panel-intro">
    <div class="panel-heading">
        <div class="panel-lead">
            <div class="row">
                <div class="col-sm-6">
                    <strong>邀请用户：</strong>
                    <span class="text-primary">{$user.nickname|default=$user.username|default='-'}</span>
                    <small class="text-muted">(ID: {$user.id})</small>
                </div>
                <div class="col-sm-6 text-right">
                    <span class="label label-primary">一级邀请: <span id="level1-count">-</span></span>
                    <span class="label label-warning" style="margin-left:10px;">二级邀请: <span id="level2-count">-</span></span>
                </div>
            </div>
        </div>
        <!-- 面包屑导航 -->
        <div id="breadcrumb-container" style="margin-top:10px;padding:8px 15px;background:#f5f5f5;border-radius:4px;">
            <ol class="breadcrumb" style="margin:0;padding:0;background:transparent;">
                <li class="active" id="breadcrumb-root">{$user.nickname|default=$user.username|default='主用户'}</li>
            </ol>
        </div>
    </div>

    <div class="panel-body">
        <div class="widget-body no-padding">
            <div id="toolbar" class="toolbar">
                <a href="javascript:;" class="btn btn-primary btn-refresh" title="刷新">
                    <i class="fa fa-refresh"></i>
                </a>
                <a href="javascript:;" id="btn-back" class="btn btn-default" title="返回上一级" style="display:none;">
                    <i class="fa fa-arrow-left"></i> 返回上一级
                </a>
                <div class="pull-right" style="margin-left:10px;">
                    <span class="text-muted" style="font-size:12px;">
                        <i class="fa fa-info-circle"></i>
                        点击"下级数量"可查看该用户的被邀请人
                    </span>
                </div>
            </div>
            <table id="table" class="table table-striped table-bordered table-hover table-nowrap" width="100%">
            </table>
        </div>
    </div>
</div>

<style>
.user-info-cell {
    display: flex;
    align-items: center;
    min-height: 40px;
}
.user-info-cell img {
    flex-shrink: 0;
}
.user-info-cell > div {
    overflow: hidden;
}
.user-info-cell > div > div {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.breadcrumb {
    margin-bottom: 0;
    padding: 0;
    border-radius: 4px;
    background: transparent;
    display: inline-block;
}
.breadcrumb > li + li:before {
    content: "/\00a0";
    padding: 0 5px;
    color: #ccc;
}
.breadcrumb > li a {
    color: #3c8dbc;
    cursor: pointer;
}
.breadcrumb > li a:hover {
    color: #23527c;
    text-decoration: underline;
}
.breadcrumb > .active {
    color: #777;
}
#breadcrumb-container {
    display: none;
}
#breadcrumb-container.has-nav {
    display: block;
}
</style>

<div class="panel panel-default panel-intro">
    <div class="panel-heading">
        <div class="panel-lead">
            <div class="row">
                <div class="col-sm-6">
                    <strong>邀请用户：</strong>
                    <span class="text-primary">{$user.nickname|default=$user.username|default='-'}</span>
                    <small class="text-muted">(ID: {$user.id})</small>
                </div>
                <div class="col-sm-6 text-right">
                    <span class="label label-primary">一级邀请: <span id="level1-count">-</span></span>
                    <span class="label label-warning" style="margin-left:10px;">二级邀请: <span id="level2-count">-</span></span>
                </div>
            </div>
        </div>
    </div>

    <div class="panel-body">
        <div class="widget-body no-padding">
            <div id="toolbar" class="toolbar">
                <a href="javascript:;" class="btn btn-primary btn-refresh" title="刷新">
                    <i class="fa fa-refresh"></i>
                </a>
                <div class="pull-right" style="margin-left:10px;">
                    <span class="text-muted" style="font-size:12px;">
                        <i class="fa fa-info-circle"></i>
                        点击"下级数量"可查看该用户的被邀请人
                    </span>
                </div>
            </div>
            <table id="table" class="table table-striped table-bordered table-hover table-nowrap" width="100%">
            </table>
        </div>
    </div>
</div>

<style>
.user-info-cell {
    display: flex;
    align-items: center;
    min-height: 40px;
}
.user-info-cell img {
    flex-shrink: 0;
}
.user-info-cell > div {
    overflow: hidden;
}
.user-info-cell > div > div {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.breadcrumb {
    margin-bottom: 0;
    padding: 8px 15px;
    border-radius: 4px;
    background: #f8f9fa;
    display: inline-block;
}
.breadcrumb > li + li:before {
    content: "/\00a0";
    padding: 0 5px;
    color: #ccc;
}
.breadcrumb > .active {
    color: #777;
}
</style>

<form id="add-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Title')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-title" class="form-control" name="row[title]" type="text" placeholder="配置名称" data-rule="required">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">邀请等级:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-level" class="form-control" name="row[level]" data-rule="required">
                <option value="1">一级邀请</option>
                <option value="2">二级邀请</option>
                <option value="3">三级邀请</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">分佣类型:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-commission_type" class="form-control" name="row[commission_type]" data-rule="required">
                <option value="percent">按比例</option>
                <option value="fixed">固定金额</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">分佣值:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-commission_value" class="form-control" name="row[commission_value]" type="number" step="0.01" value="0" data-rule="required">
            <span class="help-block">按比例时填写百分比(如10表示10%)，固定金额时填写金币数</span>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">来源场景:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-source" class="form-control" name="row[source]">
                <option value="all">全部场景</option>
                <option value="video">视频观看</option>
                <option value="withdraw">提现</option>
                <option value="task">任务完成</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-enabled" class="form-control" name="row[enabled]">
                <option value="1" selected>启用</option>
                <option value="0">禁用</option>
            </select>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>

<style>
.user-info-cell {
    display: flex;
    align-items: center;
    min-height: 40px;
}
.user-info-cell:after {
    content: '';
    clear: both;
    display: table;
}
.stat-modal .panel {
    margin-bottom: 10px;
}
.stat-modal .panel-heading {
    padding: 8px 15px;
    font-weight: bold;
}
.stat-modal .panel-body {
    padding: 10px 15px;
}
.stat-modal .panel-body p {
    margin-bottom: 5px;
}
</style>

<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <!-- 统计卡片 -->
        <div class="row" style="margin-bottom:15px;">
            <div class="col-xs-6 col-sm-3">
                <div class="panel panel-primary">
                    <div class="panel-body text-center">
                        <h3 class="panel-title">邀请人总数</h3>
                        <div class="stat-value" id="stat-total-inviter">
                            <i class="fa fa-spinner fa-spin"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xs-6 col-sm-3">
                <div class="panel panel-success">
                    <div class="panel-body text-center">
                        <h3 class="panel-title">累计邀请人数</h3>
                        <div class="stat-value" id="stat-total-invitee">
                            <i class="fa fa-spinner fa-spin"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xs-6 col-sm-3">
                <div class="panel panel-warning">
                    <div class="panel-body text-center">
                        <h3 class="panel-title">累计返现佣金</h3>
                        <div class="stat-value" id="stat-total-commission">
                            <i class="fa fa-spinner fa-spin"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xs-6 col-sm-3">
                <div class="panel panel-danger">
                    <div class="panel-body text-center">
                        <h3 class="panel-title">被邀请人提现总额</h3>
                        <div class="stat-value" id="stat-total-withdraw">
                            <i class="fa fa-spinner fa-spin"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <style>
        .panel-primary .panel-title, .panel-success .panel-title, 
        .panel-warning .panel-title, .panel-danger .panel-title {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }
        .panel-primary .stat-value { color: #337ab7; }
        .panel-success .stat-value { color: #27ae60; }
        .panel-warning .stat-value { color: #f39c12; }
        .panel-danger .stat-value { color: #e74c3c; }
        </style>

        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        {:build_toolbar('refresh')}
                        <div class="dropdown btn-group">
                            <a class="btn btn-primary btn-more dropdown-toggle btn-disabled disabled" data-toggle="dropdown">
                                <i class="fa fa-filter"></i> 筛选渠道
                            </a>
                            <ul class="dropdown-menu text-left" role="menu">
                                <li><a href="javascript:;" data-channel=""><i class="fa fa-circle text-gray"></i> 全部</a></li>
                                <li><a href="javascript:;" data-channel="link"><i class="fa fa-circle text-blue"></i> 链接邀请</a></li>
                                <li><a href="javascript:;" data-channel="qrcode"><i class="fa fa-circle text-green"></i> 二维码邀请</a></li>
                                <li><a href="javascript:;" data-channel="share"><i class="fa fa-circle text-orange"></i> 分享邀请</a></li>
                            </ul>
                        </div>
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap" width="100%">
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

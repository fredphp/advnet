<div class="panel panel-default panel-intro">
    <div class="panel-heading">
        <div class="panel-lead"><em>广告统计</em></div>
        <div class="btn-group">
            <a href="javascript:;" class="btn btn-default btn-xs active" id="btn-today">今日</a>
            <a href="javascript:;" class="btn btn-default btn-xs" id="btn-yesterday">昨日</a>
            <a href="javascript:;" class="btn btn-default btn-xs" id="btn-week">近7天</a>
            <a href="javascript:;" class="btn btn-default btn-xs" id="btn-month">本月</a>
            <a href="javascript:;" class="btn btn-default btn-xs" id="btn-custom">自定义</a>
        </div>
    </div>
    <div class="panel-body">
        <div id="custom-range" style="display:none; margin-bottom:15px;" class="form-inline">
            <input type="text" id="start_date" class="form-control datetimepicker" placeholder="开始日期" style="width:150px;">
            <span style="margin:0 10px;"> - </span>
            <input type="text" id="end_date" class="form-control datetimepicker" placeholder="结束日期" style="width:150px;">
            <a href="javascript:;" class="btn btn-primary btn-sm" id="btn-search"><i class="fa fa-search"></i> 查询</a>
        </div>

        <div class="row" id="stat-overview">
            <div class="col-md-3 col-sm-6">
                <div class="panel panel-success">
                    <div class="panel-heading text-center">
                        <h4 id="stat-records">0</h4>
                        <small>广告次数</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="panel panel-info">
                    <div class="panel-heading text-center">
                        <h4 id="stat-users">0</h4>
                        <small>活跃用户</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="panel panel-warning">
                    <div class="panel-heading text-center">
                        <h4 id="stat-user-coin">0</h4>
                        <small>用户获得(金币)</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="panel panel-danger">
                    <div class="panel-heading text-center">
                        <h4 id="stat-platform-coin">0</h4>
                        <small>平台抽成(金币)</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="row" style="margin-top:20px;">
            <div class="col-md-6">
                <div class="panel panel-default">
                    <div class="panel-heading">用户排行 TOP10</div>
                    <div class="panel-body">
                        <table class="table table-striped table-bordered">
                            <thead><tr><th width="60px">排名</th><th>用户</th><th>次数</th><th>获得金币</th></tr></thead>
                            <tbody id="user-ranking">
                                <tr><td colspan="4" class="text-center text-muted">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="panel panel-default">
                    <div class="panel-heading">按类型统计</div>
                    <div class="panel-body">
                        <table class="table table-striped table-bordered">
                            <thead><tr><th>广告类型</th><th>次数</th><th>用户金币</th></tr></thead>
                            <tbody id="type-stats">
                                <tr><td colspan="3" class="text-center text-muted">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

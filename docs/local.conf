server {
    listen       80;
    server_name  advnet.cocos2026.cn;

    root /mnt/d/phpstudy_pro/WWW/adv/public;
    index BgYmdTvqpf.php index.html;

    location / {
        if (!-e $request_filename) {
            rewrite ^(.*)$ /BgYmdTvqpf.php$1 last;
        }
    }

    # ============================================
    # WebSocket 代理 (生产环境用，前端通过 /ws 连接)
    # ============================================
    
    location /ws {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
    location ~ \.php(/|$) {
        fastcgi_pass   unix:/var/run/php/php7.4-fpm.sock;
        fastcgi_index  BgYmdTvqpf.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO       $fastcgi_path_info;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
    }

    location ~ /\. {
        deny all;
    }

    # 禁止访问敏感目录
    location ~* ^/(runtime|sql|vendor|think) {
        deny all;
    }

    # 上传目录禁止执行 PHP
    location ~* ^/uploads/.*\.php$ {
        deny all;
    }
}



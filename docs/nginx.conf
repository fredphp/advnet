# ============================================
# AdNetwork 广告网络管理系统 - Nginx 配置
# ThinkPHP 5.0 + FastAdmin 1.6.1
# 生成时间: 2025-07-14
# ============================================

# --- 限流区域定义 ---
# 按 IP 限制 API 请求频率: 每秒 10 个请求
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# --- 上游定义 ---
# Swoole WebSocket 服务器 (客户端连接)
upstream websocket_server {
    server 127.0.0.1:3002;
    keepalive 64;
}

# Swoole WebSocket 内部 API
upstream websocket_api {
    server 127.0.0.1:3003;
    keepalive 32;
}

# PHP-FPM 进程
upstream php_fpm {
    server unix:/var/run/php/php7.4-fpm.sock;
}

# --- 日志格式 ---
log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                '$status $body_bytes_sent "$http_referer" '
                '"$http_user_agent" "$http_x_forwarded_for" '
                'rt=$request_time';

# ============================================
# HTTP -> HTTPS 强制重定向
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # Let's Encrypt ACME challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 所有其他请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================
# 主服务器 (HTTPS)
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;

    # 网站根目录 (ThinkPHP public 目录)
    root /var/www/advnet/public;
    index index.php index.html index.htm;

    # ==========================================
    # SSL/TLS 配置
    # ==========================================
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling (提升 SSL 验证速度)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 8.8.8.8 8.8.4.4 valid=300s;
    # resolver_timeout 5s;

    # ==========================================
    # 安全头部
    # ==========================================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss://your-domain.com;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ==========================================
    # 日志配置
    # ==========================================
    access_log /var/log/nginx/advnet_access.log main;
    error_log  /var/log/nginx/advnet_error.log warn;

    # ==========================================
    # Gzip 压缩
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/opentype
        font/ttf
        font/woff
        font/woff2;

    # ==========================================
    # 上传限制
    # ==========================================
    client_max_body_size 20m;
    client_body_buffer_size 128k;
    client_body_timeout 60s;

    # ==========================================
    # 基础配置
    # ==========================================
    server_tokens off;
    charset utf-8;

    # 真实 IP 还原 (在使用反向代理时)
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # ==========================================
    # ThinkPHP URL 重写
    # ==========================================
    location / {
        try_files $uri $uri/ /index.php?$query_string;

        if (!-e $request_filename) {
            rewrite ^(.*)$ /index.php?s=$1 last;
        }
    }

    # ==========================================
    # API 限流
    # ==========================================
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        if (!-e $request_filename) {
            rewrite ^(.*)$ /index.php?s=$1 last;
        }
    }

    # ==========================================
    # PHP 处理 (PHP-FPM)
    # ==========================================
    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_pass   php_fpm;
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO        $fastcgi_path_info;
        fastcgi_param  PHP_VALUE        "open_basedir=/var/www/advnet/:/tmp/:/proc/";

        # FastCGI 优化
        fastcgi_buffer_size       128k;
        fastcgi_buffers           4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout      300;
        fastcgi_send_timeout      300;
        fastcgi_connect_timeout   60;

        # PATH_INFO 支持
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;
    }

    # ==========================================
    # 静态资源缓存 - CSS / JS
    # ==========================================
    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        log_not_found off;
    }

    # ==========================================
    # 静态资源缓存 - 图片
    # ==========================================
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|bmp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        log_not_found off;
    }

    # ==========================================
    # 字体文件缓存
    # ==========================================
    location ~* \.(woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
        log_not_found off;
    }

    # ==========================================
    # 上传目录安全 - 禁止执行 PHP
    # ==========================================
    location ~* ^/uploads/.*\.php$ {
        deny all;
        return 403;
    }

    # ==========================================
    # 禁止访问敏感文件和目录
    # ==========================================
    location ~ /\.env {
        deny all;
        return 403;
    }

    location ~ /\.htaccess {
        deny all;
        return 403;
    }

    location ~ /\.git {
        deny all;
        return 403;
    }

    location ~* ^/(runtime|sql|vendor|composer\.(json|lock)|think)$ {
        deny all;
        return 403;
    }

    # ==========================================
    # WebSocket 代理 (Swoole - 客户端连接)
    # ==========================================
    location /ws {
        proxy_pass http://websocket_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    # ==========================================
    # WebSocket 内部 API 代理 (仅允许本地访问)
    # ==========================================
    location /ws-api/ {
        allow 127.0.0.1;
        deny all;

        proxy_pass http://websocket_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ==========================================
    # 健康检查端点 (用于负载均衡)
    # ==========================================
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # favicon 和 robots.txt
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # ==========================================
    # 禁止访问所有隐藏文件
    # ==========================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
<!DOCTYPE html>
<html lang="zh-CN">
        <head>
                <meta charset="utf-8">
                <meta http-equiv="X-UA-Compatible" content="IE=edge">
                <link rel="shortcut icon" type="image/x-icon" href="static/favicon.ico">
                <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
                <!-- 微信分享优化：Open Graph 协议 -->
                <meta property="og:title" content="马上赚 - 邀请你一起赚钱" />
                <meta property="og:description" content="我正在使用马上赚APP，邀请你一起赚钱！快来看看吧" />
                <meta property="og:type" content="website" />
                <meta property="og:site_name" content="马上赚" />
                <title>
                        <%= htmlWebpackPlugin.options.title %>
                </title>
                <!-- 模拟touch -->
                <script src="./static/common/js/touch-emulator.js"></script>
                <script>
                    TouchEmulator();
                </script>
                <style>
                    ::-webkit-scrollbar{
                        display: none;
                    }
                </style>                
                <script>
                        document.addEventListener('DOMContentLoaded', function() {
                                document.documentElement.style.fontSize = document.documentElement.clientWidth / 20 + 'px'
                        })
                </script>
                <link rel="stylesheet" href="<%= BASE_URL %>static/index.css" />
                <script src="<%= BASE_URL %>static/js/quill.min.js"></script>
                <script src="<%= BASE_URL %>static/js/image-resize.min.js"></script>
        </head>
        <body>
                <noscript>
                        <strong>本站点必须要开启JavaScript才能运行</strong>
                </noscript>
                <div id="app"></div>
        </body>
</html>

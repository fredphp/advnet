version: '3.8'

# 短视频金币平台 - 生产环境部署配置
# 包含：Nginx, PHP-FPM, MySQL, Redis, RabbitMQ, Elasticsearch, Logstash

services:
  # ==================== Web服务器 ====================
  nginx:
    image: nginx:1.25-alpine
    container_name: advnet-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../:/var/www/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - php-fpm
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ==================== PHP-FPM ====================
  php-fpm:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: advnet-php
    restart: always
    volumes:
      - ../:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/php.ini:ro
      - ./php/php-fpm.d:/usr/local/etc/php-fpm.d:ro
      - ./php/logs:/var/log/php
    depends_on:
      - mysql
      - redis
    networks:
      - backend
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=advnet
      - DB_USERNAME=advnet
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
    healthcheck:
      test: ["CMD", "php-fpm-healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # ==================== MySQL数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: advnet-mysql
    restart: always
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/my.cnf:ro
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
      - ./mysql/backup:/backup
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=advnet
      - MYSQL_USER=advnet
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - TZ=Asia/Shanghai
    networks:
      - backend
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  # ==================== Redis缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: advnet-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # ==================== RabbitMQ消息队列 ====================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: advnet-rabbitmq
    restart: always
    ports:
      - "5672:5672"    # AMQP端口
      - "15672:15672"  # 管理界面端口
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
      - RABBITMQ_VM_MEMORY_HIGH_WATERMARK=0.6
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # ==================== Elasticsearch日志存储 ====================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: advnet-elasticsearch
    restart: always
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # ==================== Logstash日志处理 ====================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.10.0
    container_name: advnet-logstash
    restart: always
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ../runtime/logs:/var/log/app:ro
    depends_on:
      - elasticsearch
    networks:
      - backend
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==================== Supervisor进程管理 ====================
  supervisor:
    build:
      context: ./supervisor
      dockerfile: Dockerfile
    container_name: advnet-supervisor
    restart: always
    volumes:
      - ../:/var/www/html
      - ./supervisor/conf.d:/etc/supervisor/conf.d:ro
      - ./supervisor/logs:/var/log/supervisor
    depends_on:
      - php-fpm
      - rabbitmq
    networks:
      - backend
    environment:
      - APP_ENV=production
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==================== 定时任务 ====================
  cron:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: advnet-cron
    restart: always
    volumes:
      - ../:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/php.ini:ro
    depends_on:
      - mysql
      - redis
    networks:
      - backend
    entrypoint: |
      sh -c 'crontab -l | { cat; echo "* * * * * cd /var/www/html && php think schedule:run >> /var/log/cron.log 2>&1"; } | crontab - && crond -f -l 2'
    environment:
      - APP_ENV=production
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

# ==================== 网络配置 ====================
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

# ==================== 数据卷 ====================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  elasticsearch_data:
    driver: local

# API服务配置
server {
    listen 80;
    listen 443 ssl http2;
    server_name api.advnet.com;

    # SSL配置
    ssl_certificate /etc/nginx/ssl/api.advnet.com.crt;
    ssl_certificate_key /etc/nginx/ssl/api.advnet.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # 强制HTTPS
    if ($scheme = http) {
        return 301 https://$host$request_uri;
    }

    # 根目录
    root /var/www/html/public;
    index index.php index.html;

    # 访问日志
    access_log /var/log/nginx/api.access.log json;
    error_log /var/log/nginx/api.error.log warn;

    # 安全：隐藏版本号
    server_tokens off;

    # 静态文件处理
    location /static/ {
        alias /var/www/html/public/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 上传文件
    location /uploads/ {
        alias /var/www/html/public/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        
        # 图片处理
        location ~* \.(jpg|jpeg|png|gif|ico|webp)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri @cdn;
        }
    }

    # CDN回源
    location @cdn {
        return 301 https://cdn.advnet.com$uri;
    }

    # API路由
    location /api/ {
        # 限流
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;

        # CORS配置
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, User-Agent, DNT, Cache-Control, X-Mx-ReqToken, Keep-Alive, X-Requested-With, If-Modified-Since, X-Device-Id" always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Max-Age 86400 always;

        # 预检请求
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, User-Agent, DNT, Cache-Control, X-Mx-ReqToken, Keep-Alive, X-Requested-With, If-Modified-Since, X-Device-Id";
            add_header Access-Control-Allow-Credentials true;
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain charset=UTF-8;
            return 204;
        }

        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP处理
    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # FastCGI优化
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 8 128k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
        fastcgi_intercept_errors on;

        # FastCGI缓存（只缓存GET请求）
        fastcgi_cache fastcgi_cache;
        fastcgi_cache_key "$request_method|$host|$request_uri";
        fastcgi_cache_valid 200 302 1m;
        fastcgi_cache_valid 404 1m;
        fastcgi_cache_bypass $http_pragma $http_authorization;
        fastcgi_no_cache $http_pragma $http_authorization;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # PHP-FPM状态监控
    location ~ ^/(php-fpm-status|php-fpm-ping)$ {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
    }

    # 禁止访问敏感文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(composer\.(json|lock)|package\.json|Dockerfile|\.env|\.git) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 禁止访问备份文件
    location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# 后台管理配置
server {
    listen 80;
    listen 443 ssl http2;
    server_name admin.advnet.com;

    ssl_certificate /etc/nginx/ssl/admin.advnet.com.crt;
    ssl_certificate_key /etc/nginx/ssl/admin.advnet.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    if ($scheme = http) {
        return 301 https://$host$request_uri;
    }

    root /var/www/html/public;
    index index.php index.html;

    access_log /var/log/nginx/admin.access.log json;
    error_log /var/log/nginx/admin.error.log warn;

    # 后台路径
    location /BgYmdTvqpf.php {
        limit_req zone=login_limit burst=5 nodelay;
        
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 8 128k;
    }

    # FastAdmin后台路由
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\. {
        deny all;
    }
}

# WebSocket服务配置
server {
    listen 80;
    listen 443 ssl http2;
    server_name ws.advnet.com;

    ssl_certificate /etc/nginx/ssl/ws.advnet.com.crt;
    ssl_certificate_key /etc/nginx/ssl/ws.advnet.com.key;

    location / {
        proxy_pass http://php-fpm:9501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }
}

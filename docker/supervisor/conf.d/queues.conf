# 消息队列消费者进程配置

[program:withdraw_queue]
command=php /var/www/html/think queue:listen --queue withdraw
process_name=%(program_name)s_%(process_num)02d
numprocs=3
autostart=true
autorestart=true
startsecs=1
startretries=3
stopwaitsecs=30
stopsignal=QUIT
stdout_logfile=/var/log/supervisor/withdraw_queue.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stderr_logfile=/var/log/supervisor/withdraw_queue_error.log
user=www-data
priority=100


input {
  # 应用日志文件
  file {
    path => "/var/log/app/*.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb"
    type => "application"
    codec => json {
      charset => "UTF-8"
    }
    tags => ["app"]
  }

  # PHP错误日志
  file {
    path => "/var/log/php/*.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_php"
    type => "php-error"
    codec => multiline {
      pattern => "^\[%{TIMESTAMP_ISO8601}\]"
      negate => true
      what => "previous"
    }
    tags => ["php"]
  }

  # Nginx访问日志
  file {
    path => "/var/log/nginx/api.access.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_nginx_access"
    type => "nginx-access"
    codec => json {
      charset => "UTF-8"
    }
    tags => ["nginx", "access"]
  }

  # Nginx错误日志
  file {
    path => "/var/log/nginx/api.error.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_nginx_error"
    type => "nginx-error"
    tags => ["nginx", "error"]
  }

  # MySQL慢查询日志
  file {
    path => "/var/log/mysql/slow.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_mysql_slow"
    type => "mysql-slow"
    tags => ["mysql", "slow"]
  }

  # Redis日志
  file {
    path => "/var/log/redis/redis.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_redis"
    type => "redis"
    tags => ["redis"]
  }
}

filter {
  # 解析Nginx访问日志
  if [type] == "nginx-access" {
    date {
      match => ["time", "ISO8601"]
      target => "@timestamp"
    }

    useragent {
      source => "http_user_agent"
      target => "ua"
    }

    geoip {
      source => "remote_addr"
      target => "geoip"
      fields => ["city_name", "country_name", "region_name", "location"]
    }

    mutate {
      convert => {
        "status" => "integer"
        "body_bytes_sent" => "integer"
        "request_time" => "float"
        "upstream_response_time" => "float"
      }
    }
  }

  # 解析PHP错误日志
  if [type] == "php-error" {
    grok {
      match => {
        "message" => "\[%{TIMESTAMP_ISO8601:timestamp}\] %{WORD:level}: %{GREEDYDATA:message}"
      }
      overwrite => ["message"]
    }

    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # 解析MySQL慢查询
  if [type] == "mysql-slow" {
    grok {
      match => {
        "message" => "# Time: %{TIMESTAMP_ISO8601:timestamp}\n# User@Host: %{USER:user}\[%{USER:user2}\] @ %{HOSTNAME:host} \[%{IP:ip}\]\n# Query_time: %{NUMBER:query_time}  Lock_time: %{NUMBER:lock_time} Rows_sent: %{NUMBER:rows_sent}  Rows_examined: %{NUMBER:rows_examined}\n%{GREEDYDATA:query}"
      }
    }

    mutate {
      convert => {
        "query_time" => "float"
        "lock_time" => "float"
        "rows_sent" => "integer"
        "rows_examined" => "integer"
      }
    }
  }

  # 解析应用日志
  if [type] == "application" {
    date {
      match => ["datetime", "ISO8601"]
      target => "@timestamp"
    }

    mutate {
      convert => {
        "user_id" => "integer"
        "coin_amount" => "integer"
        "duration" => "integer"
      }
    }
  }
}

output {
  # 输出到Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "advnet-%{[type]}-%{+YYYY.MM.dd}"
    template_name => "advnet"
    template_overwrite => true
  }

  # 调试输出（生产环境可关闭）
  # stdout { codec => rubydebug }
}
